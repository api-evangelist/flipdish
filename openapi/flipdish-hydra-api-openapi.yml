        - api
      summary: Flipdish Hydra_Detach Store from Kiosk
      description: Hydra_Detach Store from Kiosk via the Flipdish Open API v1.0 (DELETE /api/v1.0/{appId}/DetachStoreFromKiosk/{deviceId}/store/{storeId}).
