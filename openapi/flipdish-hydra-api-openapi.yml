components:
  schemas:
    EmvTerminal:
      description: EMV Payment Terminal
      type: object
      properties:
        EmvTerminalId:
          format: int32
          description: Flipdish Identifier of Terminal
          type: integer
          example: 500123
        TerminalId:
          description: External Identifier of Terminal
          type: string
          example: '500123'
        Url:
          description: URL at which terminal can be accessed
          type: string
          example: https://api.flipdish.co/example
        Token:
          description: TOKEN required to access terminal
          type: string
          example: string
        SoftwareHouseId:
          description: Identifies us to Provider
          type: string
          example: '500123'
        InstallerId:
          description: Identifies installer of terminal
          type: string
          example: '500123'
    RestApiResult_PaymentTerminalDetails_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/PaymentTerminalDetails'
    RestApiResult_KioskSettings_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/KioskSettings'
    FlipdishError:
      type: object
      description: Standard Flipdish API error response. Errors are returned as a JSON object with a human-readable message and a programmatic error code (see https://developers.flipdish.com/docs/error-handling).
      properties:
        error:
          type: object
          description: Error detail object.
          properties:
            errorMessage:
              type: string
              description: Descriptive explanation of the issue.
              example: Invalid or missing parameters.
            errorCode:
              type: string
              description: Unique identifier for programmatic error handling.
              example: BadRequest
            details:
              type: string
              description: Additional context returned in non-production environments.
              example: Validation failed for field 'storeId'.
    RestApiArrayResult_EmvTerminalWithAssignments_:
      description: Rest api array result
      required:
      - Data
      type: object
      properties:
        Data:
          description: Generic data object.
          type: array
          items:
            $ref: '#/components/schemas/EmvTerminalWithAssignments'
          example: []
    RestApiPaginationResult_HydraDeviceDetails_:
      description: Rest api pagination result
      required:
      - Page
      - Limit
      - TotalRecordCount
      - Data
      type: object
      properties:
        Page:
          format: int32
          description: Current page index
          type: integer
          example: 1
        Limit:
          format: int32
          description: Current page size
          type: integer
          example: 1
        TotalRecordCount:
          format: int32
          description: Total record count
          type: integer
          example: 12.5
        Data:
          description: Generic data object.
          type: array
          items:
            $ref: '#/components/schemas/HydraDeviceDetails'
          example: []
    RestApiResult_HydraStatus_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/HydraStatus'
    RestApiArrayResult_KioskCashPaymentSettings_:
      description: Rest api array result
      required:
      - Data
      type: object
      properties:
        Data:
          description: Generic data object.
          type: array
          items:
            $ref: '#/components/schemas/KioskCashPaymentSettings'
          example: []
    KioskCashPaymentSettings:
      description: Get Cash Payment Settings for a UserId
      type: object
      properties:
        IsCashVisibleToCustomer:
          description: "false :disable cash on kiosk\r\ntrue :enable cash on kiosk"
          type: boolean
          example: true
        UserId:
          format: int32
          description: HydraUser ID of the Device
          type: integer
          example: 500123
    PaymentTerminalTransactionDetails:
      description: Details of Payment Terminal Transaction
      type: object
      properties:
        CardSchemeName:
          description: Card Type
          type: string
          example: Example Name
        DateOfExpiry:
          description: Expirey Date on Card
          type: string
          example: '2026-06-02T12:00:00Z'
        AuthCode:
          description: AuthCode
          type: string
          example: string
        TransactionResult:
          description: State of Request, "PENDING" is not yet completed
          type: string
          example: string
        PrimaryAccountNumber:
          description: Masked PAN
          type: string
          example: string
        CardholderVerificationMethod:
          description: Type of Verification.
          type: string
          example: string
    PaymentTerminalDetails:
      description: Details of Payment Terminal
      type: object
      properties:
        TerminalId:
          description: Terminal Id (tid)
          type: string
          example: '500123'
        Status:
          description: Status of Terminal
          type: string
          example: Active
        Currency:
          description: Currency configured on the terminal
          type: string
          example: EUR
        Uri:
          description: Location to Device
          type: string
          example: https://api.flipdish.co/example
    RestApiResult_PaymentTerminalTransactionDetails_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/PaymentTerminalTransactionDetails'
    HydraDeviceDetails:
      description: Hydra device details
      type: object
      properties:
        HydraConfigId:
          format: int32
          description: Flipdish internal device identifier
          type: integer
          example: 500123
        DeviceId:
          description: Device Id
          type: string
          example: '500123'
        SerialNumber:
          description: Serial Number
          type: string
          example: string
        DeviceType:
          description: Type of the device
          enum:
          - Kiosk
          - Terminal
          - LegacyPrinter
          type: string
          example: Kiosk
        Status:
          description: Status of the device
          enum:
          - Online
          - PossiblyOffline
          - Offline
          type: string
          example: Online
        DeviceName:
          description: Device Name
          type: string
          example: Example Name
        StoreNames:
          description: Store Names
          type: array
          items:
            $ref: '#/components/schemas/HydraStoreData'
          example: []
        LastPollUtc:
          format: date-time
          description: Last poll time in UTC
          type: string
          nullable: true
          example: '2026-06-02T12:00:00Z'
        Version:
          description: Version of the device
          type: string
          example: string
        BuildNumber:
          description: Build number of the device
          type: string
          example: string
        GitSha:
          description: SHA of the commit
          type: string
          example: string
        GitBranch:
          description: Build branch
          type: string
          example: string
    RestApiResult_HydraDeviceDetails_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/HydraDeviceDetails'
    KioskSettings:
      description: Kiosk level settings
      type: object
      properties:
        HideLogoFromFrontPage:
          description: Hide logo from front page
          type: boolean
          example: true
        TwoColumnMenuLayout:
          description: 2 Column Menu Layout
          type: boolean
          example: true
    HydraRegistrationRequest:
      description: Hydra registration result
      required:
      - StoreIds
      - DeviceName
      type: object
      properties:
        StoreIds:
          description: Stores to assign the hydra
          type: array
          items:
            format: int32
            type: integer
          example:
          - 1
        DeviceName:
          description: Hydra device name
          type: string
          example: Example Name
        PinCode:
          format: int32
          description: 6 digit PIN code (not starting with zero).
          maximum: 999999
          minimum: 100000
          type: integer
          example: 1
    DeviceSettings:
      description: Device settings for Hydra
      required:
      - Volume
      - FontSize
      - Brightness
      type: object
      properties:
        Volume:
          format: int32
          description: Gets or sets the device volume
          maximum: 10
          minimum: 0
          type: integer
          example: 1
        FontSize:
          format: double
          description: Gets or sets the font size used on the device
          maximum: 100
          minimum: 1
          type: number
          example: 1.0
        Brightness:
          format: int32
          description: Gets or sets the display brightness on the device
          maximum: 100
          minimum: 0
          type: integer
          example: 1
    HydraConfig:
      description: Hydra configuration
      required:
      - MinimumVersion
      - PaymentOptions
      - DeviceSettings
      type: object
      properties:
        MinimumVersion:
          description: Minimum version
          type: string
          example: string
        PaymentOptions:
          description: Payment options
          type: array
          items:
            enum:
            - Online
            - Emv
            - Counter
            type: string
          example:
          - Online
        DeviceSettings:
          $ref: '#/components/schemas/DeviceSettings'
        Version:
          description: Version of the device
          type: string
          example: string
        BuildNumber:
          description: Build number of the device
          type: string
          example: string
        GitSha:
          description: SHA of the commit
          type: string
          example: string
        GitBranch:
          description: Build branch
          type: string
          example: string
    EmvTerminalWithAssignments:
      description: EMV Payment Terminal
      type: object
      properties:
        EmvTerminalId:
          description: Flipdish Internal identifier of the Terminal
          type: string
          example: '500123'
        TerminalId:
          description: External Identifier of the Terminal
          type: string
          example: '500123'
        IsAssignedToHydraDevice:
          description: true if the terminal is assigned to a hydra device (e.g. a kiosk)
          type: boolean
          example: true
        HydraConfigId:
          format: int32
          description: hydra device id (null if the terminal is not assigned to any hydra device)
          type: integer
          nullable: true
          example: 500123
        HydraDeviceId:
          description: external hydra device id (null if the terminal is not assigned to any hydra device)
          type: string
          example: '500123'
        HydraName:
          description: hydra device name (null if the terminal is not assigned to any hydra device)
          type: string
          example: Example Name
    HydraStatus:
      description: Hydra status
      required:
      - AppId
      - IsRegistered
      type: object
      properties:
        AppId:
          description: ''
          type: string
          example: '500123'
        StoreIds:
          description: Store to assign the hydra
          type: array
          items:
            format: int32
            type: integer
          example:
          - 1
        IsRegistered:
          description: The device has been already registered
          type: boolean
          example: true
        PinCode:
          format: int32
          description: 6 digit PIN code (not starting with zero).
          maximum: 999999
          minimum: 100000
          type: integer
          nullable: true
          example: 1
        Images:
          description: Hydra images (covers)
          type: array
          items:
            type: string
          example:
          - string
        UserType:
          description: Hydra User Type
          enum:
          - Kiosk
          - Terminal
          - LegacyPrinter
          type: string
          example: Kiosk
    RestApiResult_HydraConfig_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/HydraConfig'
    HydraStoreData:
      description: Store Data
      type: object
      properties:
        StoreId:
          format: int32
          description: Id of the store
          type: integer
          example: 500123
        StoreName:
          description: Name of the store
          type: string
          example: Example Name
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0. Implicit grant for first-party portal apps; client credentials grant for server-to-server App Store apps (exchange Client ID + Secret Key for a bearer access token).
      flows:
        implicit:
          authorizationUrl: https://api.flipdish.co/identity/connect/authorize
          scopes:
            api: Access to the Flipdish API
        clientCredentials:
          tokenUrl: https://api.flipdish.co/identity/connect/token
          scopes:
            api: Access to the Flipdish API
