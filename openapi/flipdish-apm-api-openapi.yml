components:
  schemas:
    ApmStatus:
      description: APM status
      type: object
      properties:
        IsApmEnabled:
          description: Indicates if APM is active or otherwise
          type: boolean
          example: true
    PhoneCall:
      description: Phone call
      type: object
      properties:
        PhoneCallId:
          format: int32
          description: Phone call id
          type: integer
          example: 500123
        CallSid:
          description: Twilio Call SID
          type: string
          example: '500123'
        TimeOfCall:
          format: date-time
          description: Time of the call
          type: string
          example: '2026-06-02T12:00:00Z'
        TimeOfCallLocal:
          format: date-time
          description: Time of the call, local to the store to which the call was made
          type: string
          example: '2026-06-02T12:00:00Z'
        StoreId:
          format: int32
          description: ID of the store that the call was TO
          type: integer
          example: 500123
        StoreName:
          description: Name of the store that the call was TO
          type: string
          example: Example Name
        CallerName:
          description: Name of the caller
          type: string
          example: Example Name
        CallerUserId:
          format: int32
          description: UserID of the caller
          type: integer
          example: 500123
        CallerNumber:
          description: Phone number of the caller
          type: string
          example: string
        CallLengthInSeconds:
          format: int32
          description: The amount of time the call took
          type: integer
          example: 1
        CallStatus:
          description: The status of the call
          enum:
          - Queued
          - Ringing
          - InProgress
          - Completed
          - Failed
          - Busy
          - NoAnswer
          - Unknown
          - Canceled
          type: string
          example: Queued
    CurrencyData:
      description: A single currency data piece, with no date
      type: object
      properties:
        Currency:
          description: Currency
          enum:
          - EUR
          - USD
          - GBP
          - CAD
          - AUD
          - DJF
          - ZAR
          - ETB
          - AED
          - BHD
          - DZD
          - EGP
          - IQD
          - JOD
          - KWD
          - LBP
          - LYD
          - MAD
          - OMR
          - QAR
          - SAR
          - SYP
          - TND
          - YER
          - CLP
          - INR
          - AZN
          - RUB
          - BYN
          - BGN
          - NGN
          - BDT
          - CNY
          - BAM
          - CZK
          - DKK
          - CHF
          - MVR
          - BTN
          - XCD
          - BZD
          - HKD
          - IDR
          - JMD
          - MYR
          - NZD
