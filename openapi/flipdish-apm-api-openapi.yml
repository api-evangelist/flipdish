          - SOS
          - ALL
          - RSD
          - KES
          - TJS
          - THB
          - ERN
          - TMT
          - BWP
          - TRY
          - UAH
          - UZS
          - VND
          - MOP
          - TWD
          - BMD
          type: string
          example: EUR
        Value:
          format: double
          description: Value
          type: number
          example: 1.0
    ApmHourlyDataPoint:
      description: Provides an average value for a single hour of day of the week
      type: object
      properties:
        Day:
          description: Day of the week
          enum:
          - Sunday
          - Monday
          - Tuesday
          - Wednesday
          - Thursday
          - Friday
          - Saturday
          type: string
          example: Sunday
        Hour:
          format: int32
          description: Hour in the day
          type: integer
          example: 1
        TotalValue:
          format: int32
          description: Total Value
          type: integer
          example: 12.5
    RestApiArrayResult_ApmHourlyDataPoint_:
      description: Rest api array result
      required:
      - Data
      type: object
      properties:
        Data:
          description: Generic data object.
          type: array
          items:
