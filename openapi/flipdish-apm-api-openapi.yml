    ApmStatistics:
      description: APM Statistics
      type: object
      properties:
        EstimatedMinutesSaved:
          format: int32
          description: Total amount of time spent with APM
          type: integer
          example: 1
        EstimatedMinutesCouldSaved:
          format: int32
          description: Total amount of time that could be saved
          type: integer
          example: 1
        CurrencyData:
          description: Currency based data
          type: array
          items:
            $ref: '#/components/schemas/StatisticsCurrencyDataPoint'
          example: []
    ApmDataPoint:
      description: A single data point in timeline graphs related to APM
      type: object
      properties:
        PeriodStart:
          format: date-time
          description: Date from which the data point starts
          type: string
          example: '2026-06-02T12:00:00Z'
        PeriodLengthInDays:
          format: int32
          description: The length in days that this data point covers
          type: integer
          example: 1
        Value:
          format: int32
          description: The value of this data point
          type: integer
          example: 1
    FlipdishError:
      type: object
      description: Standard Flipdish API error response. Errors are returned as a JSON object with a human-readable message and a programmatic error code (see https://developers.flipdish.com/docs/error-handling).
      properties:
        error:
          type: object
          description: Error detail object.
          properties:
            errorMessage:
              type: string
              description: Descriptive explanation of the issue.
              example: Invalid or missing parameters.
            errorCode:
              type: string
              description: Unique identifier for programmatic error handling.
              example: BadRequest
            details:
              type: string
              description: Additional context returned in non-production environments.
              example: Validation failed for field 'storeId'.
