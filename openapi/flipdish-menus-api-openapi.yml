components:
  schemas:
    MenuSummary:
      description: Menu Summary
      type: object
      properties:
        MenuId:
          format: int32
          description: Menu identifier
          type: integer
          example: 500123
        ModifiedTime:
          format: date-time
          description: Last modified time
          type: string
          example: '2026-06-02T12:00:00Z'
        VersionNumber:
          format: int32
          description: Menu version
          type: integer
          example: 3
        MenuUrl:
          description: Menu Url
          type: string
          example: https://api.flipdish.co/example
        Name:
          description: Name of Menu, only shown in portal
          type: string
          example: Example Name
        Locked:
          description: 'Locked: is menu locked against modifcation'
          type: boolean
          example: true
        StoreNames:
          description: List of stores names which are associated with this menu
          type: array
          items:
            type: string
          example:
          - Example Name
        IsIntegrated:
          description: Flag to indicate if the menu is integrated (contains metadata)
          type: boolean
          example: true
    MenuSectionItem:
      description: Menu item
      type: object
      properties:
        ActualPrice:
          format: double
          description: Actual price - the minimum price possible when all required option set items prices are included.
          type: number
          example: 12.5
        MenuItemOptionSets:
          description: Menu item option sets
          type: array
          items:
            $ref: '#/components/schemas/MenuItemOptionSet'
          example: []
        DailySpecialHours:
          description: Daily special hours
          type: array
          items:
            $ref: '#/components/schemas/BusinessHoursPeriod'
          example: []
        PublicId:
          format: uuid
          description: Permanent reference to the item.
          type: string
          example: 00000000-0000-0000-0000-000000000000
        TaxRateName:
          description: Tax rate name
          type: string
          example: Example Name
        TaxRateId:
