        CellLayoutType:
          description: "Small | Medium | Large\r\nAffects the layout of the menu."
          enum:
          - Small
          - Medium
          - Large
          - HiddenImage
          type: string
          example: Small
    FlipdishError:
      type: object
      description: Standard Flipdish API error response. Errors are returned as a JSON object with a human-readable message and a programmatic error code (see https://developers.flipdish.com/docs/error-handling).
      properties:
        error:
          type: object
          description: Error detail object.
          properties:
            errorMessage:
              type: string
              description: Descriptive explanation of the issue.
              example: Invalid or missing parameters.
            errorCode:
              type: string
              description: Unique identifier for programmatic error handling.
              example: BadRequest
            details:
              type: string
              description: Additional context returned in non-production environments.
              example: Validation failed for field 'storeId'.
    BusinessHoursPeriod:
      description: Business hours period
      type: object
      properties:
        Early:
          $ref: '#/components/schemas/Range'
        Late:
          $ref: '#/components/schemas/Range'
        Ranges:
          description: Ranges
          type: array
          items:
            $ref: '#/components/schemas/Range'
          example: []
        DayOfWeek:
          description: Day of week
          enum:
          - Sunday
          - Monday
          - Tuesday
          - Wednesday
          - Thursday
          - Friday
          - Saturday
          type: string
          example: Sunday
        StartTime:
          description: Start time
          type: string
          example: '2026-06-02T12:00:00Z'
        Period:
          description: Period
          type: string
          example: string
        StartTimeEarly:
          description: Start time early
          type: string
          example: string
        PeriodEarly:
          description: Period early
          type: string
          example: string
    MenuItemOptionSetItem:
      description: Menu item option set item
      type: object
      properties:
        MenuItemOptionSetItemId:
          format: int32
          description: Menu item option set item identifier
          type: integer
          example: 500123
        PublicId:
          format: uuid
          description: Permanent reference to the item.
          type: string
          example: 00000000-0000-0000-0000-000000000000
        Metadata:
          description: List of metadata
          type: array
          items:
            $ref: '#/components/schemas/CreateMetadata'
          example: []
        NextMenuItemOptionSetId:
          format: int32
          description: if null, next option set is next. if -1, this is the final option set
          type: integer
          nullable: true
          example: 500123
        CatalogItemId:
          description: Catalog item Id when the OptionSet is associated to a Product
          type: string
          example: '500123'
        TaxRateName:
          description: Tax rate name
          type: string
          example: Example Name
        TaxRateId:
          format: int32
          description: TaxRateId.
          type: integer
          nullable: true
          example: 500123
        TaxValue:
          format: double
          description: TaxValue.
          type: number
          example: 1.0
        Name:
          description: Name
          type: string
          example: Example Name
        Price:
          format: double
          description: Price
          type: number
          example: 12.5
        DepositReturnFee:
          format: double
          description: An optional fee that can be added to the price of the item.
          type: number
          nullable: true
          example: 12.5
        IsAvailable:
          description: Is available
          type: boolean
          example: true
        DisplayOrder:
          format: int32
          description: Display order. Displayed in ascending order.
          type: integer
          example: 1
        CellLayoutType:
          description: "Small | Medium | Large\r\nAffects the layout of the menu."
          enum:
          - Small
          - Medium
          - Large
          - HiddenImage
          type: string
          example: Small
        ImageUrl:
          description: Image url
          type: string
          example: https://api.flipdish.co/example
  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth 2.0. Implicit grant for first-party portal apps; client credentials grant for server-to-server App Store apps (exchange Client ID + Secret Key for a bearer access token).
      flows:
        implicit:
          authorizationUrl: https://api.flipdish.co/identity/connect/authorize
          scopes:
            api: Access to the Flipdish API
        clientCredentials:
          tokenUrl: https://api.flipdish.co/identity/connect/token
          scopes:
            api: Access to the Flipdish API
