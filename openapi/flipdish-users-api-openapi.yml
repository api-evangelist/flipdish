components:
  schemas:
    FlipdishAccountName:
      description: Flipdish Account Name
      type: object
      properties:
        PayeeBankAccountDataId:
          format: int32
          description: Payee Bank Account Data Id
          type: integer
          nullable: true
          example: 500123
        FlipdishAccountId:
          format: int32
          description: Flipdish Account Id
          type: integer
          example: 500123
        Name:
          description: Account Name
          type: string
          example: Example Name
    RestApiDefaultResponse:
      description: Rest api default response
      type: object
      properties:
        Data:
          description: Data string
          type: string
          readOnly: true
          example: string
    RestApiResult_Order_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/Order'
    PaymentAccount:
      description: Payment Account information
      type: object
      properties:
        UserId:
          format: int32
          description: The user ID associated with the payment account.
          type: integer
          example: 500123
        PaymentAccountId:
          format: int32
          description: Unique identifier for the payment account.
          type: integer
          example: 500123
        CanRemoveFromCustomerView:
          description: Indicates if the payment account can be removed from the customer view.
          type: boolean
          example: true
        Bin:
          description: Bank Identification Number (BIN) of the payment method.
          type: string
          example: string
        IsDefaultPaymentMethod:
          description: Indicates if this is the default payment method.
          type: boolean
          example: true
        IsVisibleToCustomer:
          description: Indicates if the payment account is visible to the customer.
          type: boolean
          example: true
        PaymentAccountType:
          description: The type of payment account (e.g., card, PayPal).
          type: string
          example: string
        Description:
          description: Description of the payment account.
          type: string
          example: string
        CustomerId:
          description: The customer ID associated with the payment account.
          type: string
          example: '500123'
    RestApiStringResult:
      description: Rest api string result
      required:
      - Data
      type: object
      properties:
        Data:
          description: Data string
          type: string
          example: string
    FlipdishError:
      type: object
