components:
  schemas:
    NutritionInfoMenuOptionSetItem:
      description: NutritionInfoMenuOptionSetItem.
      type: object
      properties:
        PublicId:
          format: uuid
          description: Menu item option set item public id
          type: string
          example: 00000000-0000-0000-0000-000000000000
        Labels:
          description: List of Nutrition Info Labels for this menu item option set item
          type: array
          items:
            $ref: '#/components/schemas/NutritionInfoLabel'
          example: []
    RestApiResult_NutritionInfo_:
      description: Rest api result
      required:
      - Data
      type: object
      properties:
        Data:
          $ref: '#/components/schemas/NutritionInfo'
    NutritionInfoLabel:
      description: NutritionInfoLabel.
      type: object
      properties:
        Name:
          description: Name of the allergen / ingredient
          type: string
          example: Example Name
        Values:
          description: Optional list of values for the allergen / ingredient
          type: array
          items:
            type: string
          example:
          - string
        IconUrl:
          description: Url to the icon for the allergen / ingredient
          type: string
          example: https://api.flipdish.co/example
    Allergen:
      description: Allergen.
      type: object
      properties:
        AllergenId:
          description: A unique identifier for the allergen
          type: string
          example: '500123'
        LocalizedName:
          description: Localized name of the allergen
          type: string
          example: Example Name
        IconUrl:
          description: Url to the icon for the allergen
          type: string
          example: https://api.flipdish.co/example
    NutritionInfoMenuItem:
      description: NutritionInfoMenuItem.
      type: object
      properties:
        PublicId:
          format: uuid
          description: Menu item public id
          type: string
          example: 00000000-0000-0000-0000-000000000000
        Labels:
          description: List of Nutrition Info Labels for this menu item
          type: array
          items:
            $ref: '#/components/schemas/NutritionInfoLabel'
          example: []
    MenuNutritionInfoHeader:
      description: MenuNutritionInfoHeader.
      type: object
      properties:
        MenuId:
          format: int32
          description: Menu Id
          type: integer
          example: 500123
        NutritionInfoVersionGuid:
          format: uuid
          description: Nutrition information version guid (generated every time the nutrition information is updated)
          type: string
