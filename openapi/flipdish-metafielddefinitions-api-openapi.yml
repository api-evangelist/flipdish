              description: Additional context returned in non-production environments.
              example: Validation failed for field 'storeId'.
    MetafieldDefinition:
      description: Metafield Definition
      required:
      - Key
      - Name
      type: object
      properties:
        IsReadOnly:
          description: Indicates if a definition can be edited or not
          type: boolean
          example: true
        OwnerEntity:
          description: The Metafield will extend the specified {Flipdish.Metafields.PublicModels.V1.MetafieldDefinitionBase.OwnerEntity}
          enum:
          - CatalogItem
          - CatalogGroup
          - Menu
          type: string
          example: CatalogItem
        Key:
          description: "Key of the metafield.\r\nThe key must have two parts, separated by a dot. The first part acts as a category, for organizational purposes.\r\nThe parts can be composed of lowercase letters, numbers, hyphen and underscore"
          type: string
          example: string
        ValueType:
          description: The excepted type for the Value field
          enum:
          - Boolean
          - Json
          - SingleLineString
          - MultiLineString
          type: string
          example: Boolean
        Name:
          description: Field Name
          type: string
          example: Example Name
        Description:
          description: Field Description
          type: string
          example: string
        Behaviors:
          description: Enable Metafield Behaviors
          type: array
          items:
            enum:
            - SendToOrder
            - SendToMenu
            type: string
          example:
          - SendToOrder
        MetafieldDefinitionRecommendationId:
          format: int32
          description: Metafield Recommendation Id
          type: integer
          nullable: true
          example: 500123
    OwnerEntityConfigurations:
      description: Owner Entity Configurations
      type: object
