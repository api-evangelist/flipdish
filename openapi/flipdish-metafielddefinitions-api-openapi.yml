      type: object
      properties:
        OwnerEntity:
          description: Owner Entity
          enum:
          - CatalogItem
          - CatalogGroup
          - Menu
          type: string
          example: CatalogItem
        AllowedBehaviors:
          description: ''
          type: array
          items:
            enum:
            - SendToOrder
            - SendToMenu
            type: string
          example:
          - SendToOrder
    UpdateMetafieldDefinition:
      description: Information to update a {Flipdish.Metafields.PublicModels.V1.MetafieldDefinition}
