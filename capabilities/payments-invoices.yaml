naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Payments — Invoices"
  description: >-
    Invoices operations on the Flipdish Open API v1.0 (4 operations).
    Lead operation: Flipdish Invoice Pdf. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Invoices
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "payments-invoices"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Payments — Invoices business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-invoices-invoice-pdf"
          path: "/api/v1.0/{appId}/invoices/InvoicePdf"
          operations:
            - name: "InvoicePdf"
              method: GET
              description: "Flipdish Invoice Pdf"
              inputParameters:
                - name: "invoiceNumber"
                  in: query
                  type: string
                  required: true
                  description: "The invoice number query parameter."
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-invoices-list-invoices"
          path: "/api/v1.0/{appId}/invoices/ListInvoices"
          operations:
            - name: "ListInvoices"
              method: GET
              description: "Flipdish List Invoices"
              inputParameters:
                - name: "storeId"
                  in: query
                  type: integer
                  required: true
                  description: "The store id query parameter."
                - name: "limit"
                  in: query
                  type: integer
                  required: false
                  description: "The limit query parameter."
                - name: "page"
                  in: query
                  type: integer
                  required: false
                  description: "The page query parameter."
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-invoices"
          path: "/api/v1.0/{appId}/invoices"
          operations:
            - name: "GetInvoices"
              method: GET
              description: "Flipdish Get Invoices"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "subscriptionId"
                  in: query
                  type: string
                  required: false
                  description: "The subscription id query parameter."
                - name: "limit"
                  in: query
                  type: integer
                  required: false
                  description: "The limit query parameter."
                - name: "pageId"
                  in: query
                  type: string
                  required: false
                  description: "The page id query parameter."
                - name: "excludeNotOwnedInvoices"
                  in: query
                  type: boolean
                  required: false
                  description: "The exclude not owned invoices query parameter."
                - name: "dateFrom"
                  in: query
                  type: string
                  required: false
                  description: "The date from query parameter."
                - name: "dateTo"
                  in: query
                  type: string
                  required: false
                  description: "The date to query parameter."
                - name: "invoiceNumber"
                  in: query
                  type: string
                  required: false
                  description: "The invoice number query parameter."
                - name: "storeId"
                  in: query
                  type: array
                  required: false
                  description: "The store id query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-invoices-list-subscription-invoices"
          path: "/api/v1.0/{appId}/invoices/ListSubscriptionInvoices"
          operations:
            - name: "ListSubscriptionInvoices"
              method: GET
              description: "Flipdish List Subscription Invoices"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "subscriptionId"
                  in: query
                  type: string
                  required: false
                  description: "The subscription id query parameter."
                - name: "limit"
                  in: query
                  type: integer
                  required: false
                  description: "The limit query parameter."
                - name: "pageId"
                  in: query
                  type: string
                  required: false
                  description: "The page id query parameter."
                - name: "excludeNotOwnedInvoices"
                  in: query
                  type: boolean
                  required: false
                  description: "The exclude not owned invoices query parameter."
                - name: "dateFrom"
                  in: query
                  type: string
                  required: false
                  description: "The date from query parameter."
                - name: "dateTo"
                  in: query
                  type: string
                  required: false
                  description: "The date to query parameter."
                - name: "invoiceNumber"
                  in: query
                  type: string
                  required: false
                  description: "The invoice number query parameter."
                - name: "storeId"
                  in: query
                  type: array
                  required: false
                  description: "The store id query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "payments-invoices-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Payments — Invoices."
      resources:
        - path: "/v1/{app-id}/invoices/invoice-pdf"
          name: "app-id-invoices-invoice-pdf"
          description: "REST surface for InvoicePdf."
          operations:
            - method: GET
              name: "InvoicePdf"
              description: "Flipdish Invoice Pdf"
              call: "payments-invoices.InvoicePdf"
              with:
                "invoiceNumber": "rest.invoiceNumber"
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/invoices/list-invoices"
          name: "app-id-invoices-list-invoices"
          description: "REST surface for ListInvoices."
          operations:
            - method: GET
              name: "ListInvoices"
              description: "Flipdish List Invoices"
              call: "payments-invoices.ListInvoices"
              with:
                "storeId": "rest.storeId"
                "limit": "rest.limit"
                "page": "rest.page"
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/invoices"
          name: "app-id-invoices"
          description: "REST surface for GetInvoices."
          operations:
            - method: GET
              name: "GetInvoices"
              description: "Flipdish Get Invoices"
              call: "payments-invoices.GetInvoices"
              with:
                "appId": "rest.appId"
                "subscriptionId": "rest.subscriptionId"
                "limit": "rest.limit"
                "pageId": "rest.pageId"
                "excludeNotOwnedInvoices": "rest.excludeNotOwnedInvoices"
                "dateFrom": "rest.dateFrom"
                "dateTo": "rest.dateTo"
                "invoiceNumber": "rest.invoiceNumber"
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/invoices/list-subscription-invoices"
          name: "app-id-invoices-list-subscription-invoices"
          description: "REST surface for ListSubscriptionInvoices."
          operations:
            - method: GET
              name: "ListSubscriptionInvoices"
              description: "Flipdish List Subscription Invoices"
              call: "payments-invoices.ListSubscriptionInvoices"
              with:
                "appId": "rest.appId"
                "subscriptionId": "rest.subscriptionId"
                "limit": "rest.limit"
                "pageId": "rest.pageId"
                "excludeNotOwnedInvoices": "rest.excludeNotOwnedInvoices"
                "dateFrom": "rest.dateFrom"
                "dateTo": "rest.dateTo"
                "invoiceNumber": "rest.invoiceNumber"
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "payments-invoices-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Payments — Invoices."
      tools:
        - name: "invoice-pdf"
          description: "Flipdish Invoice Pdf"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-invoices.InvoicePdf"
          with:
            "invoiceNumber": "tools.invoiceNumber"
            "appId": "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-invoices"
          description: "Flipdish List Invoices"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-invoices.ListInvoices"
          with:
            "storeId": "tools.storeId"
            "limit": "tools.limit"
            "page": "tools.page"
            "appId": "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-invoices"
          description: "Flipdish Get Invoices"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-invoices.GetInvoices"
          with:
            "appId": "tools.appId"
            "subscriptionId": "tools.subscriptionId"
            "limit": "tools.limit"
            "pageId": "tools.pageId"
            "excludeNotOwnedInvoices": "tools.excludeNotOwnedInvoices"
            "dateFrom": "tools.dateFrom"
            "dateTo": "tools.dateTo"
            "invoiceNumber": "tools.invoiceNumber"
            "storeId": "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-subscription-invoices"
          description: "Flipdish List Subscription Invoices"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-invoices.ListSubscriptionInvoices"
          with:
            "appId": "tools.appId"
            "subscriptionId": "tools.subscriptionId"
            "limit": "tools.limit"
            "pageId": "tools.pageId"
            "excludeNotOwnedInvoices": "tools.excludeNotOwnedInvoices"
            "dateFrom": "tools.dateFrom"
            "dateTo": "tools.dateTo"
            "invoiceNumber": "tools.invoiceNumber"
            "storeId": "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
