naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Devices — Heartbeat"
  description: >-
    Heartbeat operations on the Flipdish Open API v1.0 (2 operations).
    Lead operation: Flipdish Ping. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Heartbeat
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "devices-heartbeat"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Devices — Heartbeat business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "heartbeat"
          path: "/api/v1.0/heartbeat"
          operations:
            - name: "Ping"
              method: GET
              description: "Flipdish Ping"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "heartbeat-hostname"
          path: "/api/v1.0/heartbeat/Hostname"
          operations:
            - name: "Hostname"
              method: GET
              description: "Flipdish Hostname"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "devices-heartbeat-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Devices — Heartbeat."
      resources:
        - path: "/v1/heartbeat"
          name: "heartbeat"
          description: "REST surface for Ping."
          operations:
            - method: GET
              name: "Ping"
              description: "Flipdish Ping"
              call: "devices-heartbeat.Ping"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/heartbeat/hostname"
          name: "heartbeat-hostname"
          description: "REST surface for Hostname."
          operations:
            - method: GET
              name: "Hostname"
              description: "Flipdish Hostname"
              call: "devices-heartbeat.Hostname"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "devices-heartbeat-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Devices — Heartbeat."
      tools:
        - name: "ping"
          description: "Flipdish Ping"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "devices-heartbeat.Ping"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "hostname"
          description: "Flipdish Hostname"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "devices-heartbeat.Hostname"
          outputParameters:
            - type: object
              mapping: "$."
