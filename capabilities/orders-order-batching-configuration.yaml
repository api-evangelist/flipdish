naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Orders — OrderBatchingConfiguration"
  description: >-
    OrderBatchingConfiguration operations on the Flipdish Open API v1.0 (2 operations).
    Lead operation: Flipdish Get. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Order Batching Configuration
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "orders-order-batching-configuration"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Orders — OrderBatchingConfiguration business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "stores-store-id-order-batching-configuration"
          path: "/api/v1.0/stores/{storeId}/order-batching-configuration"
          operations:
            - name: "Get"
              method: GET
              description: "Flipdish Get"
              inputParameters:
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "stores-store-id-order-batching-configuration"
          path: "/api/v1.0/stores/{storeId}/order-batching-configuration"
          operations:
            - name: "Post"
              method: POST
              description: "Flipdish Post"
              inputParameters:
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "orders-order-batching-configuration-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Orders — OrderBatchingConfiguration."
      resources:
        - path: "/v1/stores/{store-id}/order-batching-configuration"
          name: "stores-store-id-order-batching-configuration"
          description: "REST surface for Get."
          operations:
            - method: GET
              name: "Get"
              description: "Flipdish Get"
              call: "orders-order-batching-configuration.Get"
              with:
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/stores/{store-id}/order-batching-configuration"
          name: "stores-store-id-order-batching-configuration"
          description: "REST surface for Post."
          operations:
            - method: POST
              name: "Post"
              description: "Flipdish Post"
              call: "orders-order-batching-configuration.Post"
              with:
                "storeId": "rest.storeId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "orders-order-batching-configuration-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Orders — OrderBatchingConfiguration."
      tools:
        - name: "get"
          description: "Flipdish Get"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "orders-order-batching-configuration.Get"
          with:
            "storeId": "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "post"
          description: "Flipdish Post"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "orders-order-batching-configuration.Post"
          with:
            "storeId": "tools.storeId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
