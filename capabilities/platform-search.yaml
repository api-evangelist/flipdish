naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Search"
  description: >-
    Search operations on the Flipdish Open API v1.0 (1 operations).
    Lead operation: Flipdish Search Restaurants. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Search
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "platform-search"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Platform — Search business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "search-restaurants"
          path: "/api/v1.0/search/restaurants"
          operations:
            - name: "SearchRestaurants"
              method: GET
              description: "Flipdish Search Restaurants"
              inputParameters:
                - name: "query"
                  in: query
                  type: string
                  required: true
                  description: "The query query parameter."
                - name: "countryId"
                  in: query
                  type: string
                  required: true
                  description: "The country id query parameter."
                - name: "includeArchivedStores"
                  in: query
                  type: string
                  required: false
                  description: "The include archived stores query parameter."
                - name: "searchType"
                  in: query
                  type: string
                  required: false
                  description: "The search type query parameter."
                - name: "publishedStatus"
                  in: query
                  type: string
                  required: false
                  description: "The published status query parameter."
                - name: "page"
                  in: query
                  type: integer
                  required: false
                  description: "The page query parameter."
                - name: "limit"
                  in: query
                  type: integer
                  required: false
                  description: "The limit query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "platform-search-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Platform — Search."
      resources:
        - path: "/v1/search/restaurants"
          name: "search-restaurants"
          description: "REST surface for SearchRestaurants."
          operations:
            - method: GET
              name: "SearchRestaurants"
              description: "Flipdish Search Restaurants"
              call: "platform-search.SearchRestaurants"
              with:
                "query": "rest.query"
                "countryId": "rest.countryId"
                "includeArchivedStores": "rest.includeArchivedStores"
                "searchType": "rest.searchType"
                "publishedStatus": "rest.publishedStatus"
                "page": "rest.page"
                "limit": "rest.limit"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "platform-search-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Platform — Search."
      tools:
        - name: "search-restaurants"
          description: "Flipdish Search Restaurants"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-search.SearchRestaurants"
          with:
            "query": "tools.query"
            "countryId": "tools.countryId"
            "includeArchivedStores": "tools.includeArchivedStores"
            "searchType": "tools.searchType"
            "publishedStatus": "tools.publishedStatus"
            "page": "tools.page"
            "limit": "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
