naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Customers — Customers"
  description: >-
    Customers operations on the Flipdish Open API v1.0 (4 operations).
    Lead operation: Flipdish Get Customer by Id. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Customers
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "customers-customers"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Customers — Customers business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-customers-customer-id"
          path: "/api/v1.0/{appId}/customers/{customerId}"
          operations:
            - name: "GetCustomerById"
              method: GET
              description: "Flipdish Get Customer by Id"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "customerId"
                  in: path
                  type: integer
                  required: true
                  description: "The customer id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-customers-customer-id"
          path: "/api/v1.0/{appId}/customers/{customerId}"
          operations:
            - name: "UpdateCustomerById"
              method: POST
              description: "Flipdish Update Customer by Id"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "customerId"
                  in: path
                  type: integer
                  required: true
                  description: "The customer id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-customers"
          path: "/api/v1.0/{appId}/customers"
          operations:
            - name: "GetCustomers"
              method: GET
              description: "Flipdish Get Customers"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "phoneNumber"
                  in: query
                  type: string
                  required: true
                  description: "The phone number query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-customers"
          path: "/api/v1.0/{appId}/customers"
          operations:
            - name: "CreateCustomer"
              method: POST
              description: "Flipdish Create Customer"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "customers-customers-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Customers — Customers."
      resources:
        - path: "/v1/{app-id}/customers/{customer-id}"
          name: "app-id-customers-customer-id"
          description: "REST surface for GetCustomerById."
          operations:
            - method: GET
              name: "GetCustomerById"
              description: "Flipdish Get Customer by Id"
              call: "customers-customers.GetCustomerById"
              with:
                "appId": "rest.appId"
                "customerId": "rest.customerId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/customers/{customer-id}"
          name: "app-id-customers-customer-id"
          description: "REST surface for UpdateCustomerById."
          operations:
            - method: POST
              name: "UpdateCustomerById"
              description: "Flipdish Update Customer by Id"
              call: "customers-customers.UpdateCustomerById"
              with:
                "appId": "rest.appId"
                "customerId": "rest.customerId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/customers"
          name: "app-id-customers"
          description: "REST surface for GetCustomers."
          operations:
            - method: GET
              name: "GetCustomers"
              description: "Flipdish Get Customers"
              call: "customers-customers.GetCustomers"
              with:
                "appId": "rest.appId"
                "phoneNumber": "rest.phoneNumber"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/customers"
          name: "app-id-customers"
          description: "REST surface for CreateCustomer."
          operations:
            - method: POST
              name: "CreateCustomer"
              description: "Flipdish Create Customer"
              call: "customers-customers.CreateCustomer"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "customers-customers-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Customers — Customers."
      tools:
        - name: "get-customer-id"
          description: "Flipdish Get Customer by Id"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "customers-customers.GetCustomerById"
          with:
            "appId": "tools.appId"
            "customerId": "tools.customerId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-customer-id"
          description: "Flipdish Update Customer by Id"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "customers-customers.UpdateCustomerById"
          with:
            "appId": "tools.appId"
            "customerId": "tools.customerId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-customers"
          description: "Flipdish Get Customers"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "customers-customers.GetCustomers"
          with:
            "appId": "tools.appId"
            "phoneNumber": "tools.phoneNumber"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "create-customer"
          description: "Flipdish Create Customer"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "customers-customers.CreateCustomer"
          with:
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
