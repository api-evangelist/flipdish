naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Customers — Teammates"
  description: >-
    Teammates operations on the Flipdish Open API v1.0 (10 operations).
    Lead operation: Flipdish Get Teammates by App Id. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Teammates
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
