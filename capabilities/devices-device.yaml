naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Devices — Device"
  description: >-
    Device operations on the Flipdish Open API v1.0 (4 operations).
    Lead operation: Flipdish Get Device Details. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Device
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "devices-device"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Devices — Device business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-devices-device-device-model-device-id"
          path: "/api/v1.0/{appId}/devices/device/{deviceModel}/{deviceId}"
          operations:
            - name: "GetDeviceDetails"
              method: GET
              description: "Flipdish Get Device Details"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "deviceModel"
                  in: path
                  type: string
                  required: true
                  description: "The device model path parameter."
                - name: "deviceId"
                  in: path
                  type: string
                  required: true
                  description: "The device id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-devices-search"
          path: "/api/v1.0/{appId}/devices/search"
          operations:
            - name: "SearchDevices"
              method: GET
              description: "Flipdish Search Devices"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "storeId"
                  in: query
                  type: integer
                  required: false
                  description: "The store id query parameter."
                - name: "deviceModel"
                  in: query
                  type: string
                  required: false
                  description: "The device model query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-devices-assign"
          path: "/api/v1.0/{appId}/devices/assign"
          operations:
            - name: "AssignDevice"
              method: POST
              description: "Flipdish Assign Device"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-devices-enroll"
          path: "/api/v1.0/{appId}/devices/enroll"
          operations:
            - name: "EnrollDevice"
              method: POST
              description: "Flipdish Enroll Device"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "devices-device-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Devices — Device."
      resources:
        - path: "/v1/{app-id}/devices/device/{device-model}/{device-id}"
          name: "app-id-devices-device-device-model-device-id"
          description: "REST surface for GetDeviceDetails."
          operations:
            - method: GET
              name: "GetDeviceDetails"
              description: "Flipdish Get Device Details"
              call: "devices-device.GetDeviceDetails"
              with:
                "appId": "rest.appId"
                "deviceModel": "rest.deviceModel"
                "deviceId": "rest.deviceId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/devices/search"
          name: "app-id-devices-search"
          description: "REST surface for SearchDevices."
          operations:
            - method: GET
              name: "SearchDevices"
              description: "Flipdish Search Devices"
              call: "devices-device.SearchDevices"
              with:
                "appId": "rest.appId"
                "storeId": "rest.storeId"
                "deviceModel": "rest.deviceModel"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/devices/assign"
          name: "app-id-devices-assign"
          description: "REST surface for AssignDevice."
          operations:
            - method: POST
              name: "AssignDevice"
              description: "Flipdish Assign Device"
              call: "devices-device.AssignDevice"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/devices/enroll"
          name: "app-id-devices-enroll"
          description: "REST surface for EnrollDevice."
          operations:
            - method: POST
              name: "EnrollDevice"
              description: "Flipdish Enroll Device"
              call: "devices-device.EnrollDevice"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "devices-device-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Devices — Device."
      tools:
        - name: "get-device-details"
          description: "Flipdish Get Device Details"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "devices-device.GetDeviceDetails"
          with:
            "appId": "tools.appId"
            "deviceModel": "tools.deviceModel"
            "deviceId": "tools.deviceId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "search-devices"
          description: "Flipdish Search Devices"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "devices-device.SearchDevices"
          with:
            "appId": "tools.appId"
            "storeId": "tools.storeId"
            "deviceModel": "tools.deviceModel"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "assign-device"
          description: "Flipdish Assign Device"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "devices-device.AssignDevice"
          with:
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "enroll-device"
          description: "Flipdish Enroll Device"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "devices-device.EnrollDevice"
          with:
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
