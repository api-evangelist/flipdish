naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — Website"
  description: >-
    Website operations on the Flipdish Open API v1.0 (8 operations).
    Lead operation: Flipdish Get Index Configuration. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Website
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "apps-website"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Apps — Website business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-website-index"
          path: "/api/v1.0/{appId}/website/index"
          operations:
            - name: "GetIndexConfiguration"
              method: GET
              description: "Flipdish Get Index Configuration"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-website-index"
          path: "/api/v1.0/{appId}/website/index"
          operations:
            - name: "SetIndexConfiguration"
              method: POST
              description: "Flipdish Set Index Configuration"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-website-dnscheck"
          path: "/api/v1.0/{appId}/website/dnscheck"
          operations:
            - name: "Website_CheckNow"
              method: GET
              description: "Flipdish Website_Check Now"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-website-testimonial"
          path: "/api/v1.0/{appId}/website/testimonial"
          operations:
            - name: "AddTestimonial"
              method: POST
              description: "Flipdish Add Testimonial"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-website-image-image-location"
          path: "/api/v1.0/{appId}/website/image/{imageLocation}"
          operations:
            - name: "UploadWebsiteImage"
              method: POST
              description: "Flipdish Upload Website Image"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "imageLocation"
                  in: path
                  type: string
                  required: true
                  description: "The image location path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-website-testimonial-testimonial-id"
          path: "/api/v1.0/{appId}/website/testimonial/{testimonialId}"
          operations:
            - name: "EditTestimonial"
              method: POST
              description: "Flipdish Edit Testimonial"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "testimonialId"
                  in: path
                  type: integer
                  required: true
                  description: "The testimonial id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-website-testimonial-testimonial-id"
          path: "/api/v1.0/{appId}/website/testimonial/{testimonialId}"
          operations:
            - name: "DeleteTestimonial"
              method: DELETE
              description: "Flipdish Delete Testimonial"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "testimonialId"
                  in: path
                  type: integer
                  required: true
                  description: "The testimonial id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-website-image-image-id"
          path: "/api/v1.0/{appId}/website/image/{imageId}"
          operations:
            - name: "DeleteWebsiteImage"
              method: DELETE
              description: "Flipdish Delete Website Image"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "imageId"
                  in: path
                  type: integer
                  required: true
                  description: "The image id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "apps-website-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Apps — Website."
      resources:
        - path: "/v1/{app-id}/website/index"
          name: "app-id-website-index"
          description: "REST surface for GetIndexConfiguration."
          operations:
            - method: GET
              name: "GetIndexConfiguration"
              description: "Flipdish Get Index Configuration"
              call: "apps-website.GetIndexConfiguration"
              with:
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/website/index"
          name: "app-id-website-index"
          description: "REST surface for SetIndexConfiguration."
          operations:
            - method: POST
              name: "SetIndexConfiguration"
              description: "Flipdish Set Index Configuration"
              call: "apps-website.SetIndexConfiguration"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/website/dnscheck"
          name: "app-id-website-dnscheck"
          description: "REST surface for Website_CheckNow."
          operations:
            - method: GET
              name: "Website_CheckNow"
              description: "Flipdish Website_Check Now"
              call: "apps-website.Website_CheckNow"
              with:
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/website/testimonial"
          name: "app-id-website-testimonial"
          description: "REST surface for AddTestimonial."
          operations:
            - method: POST
              name: "AddTestimonial"
              description: "Flipdish Add Testimonial"
              call: "apps-website.AddTestimonial"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/website/image/{image-location}"
          name: "app-id-website-image-image-location"
          description: "REST surface for UploadWebsiteImage."
          operations:
            - method: POST
              name: "UploadWebsiteImage"
              description: "Flipdish Upload Website Image"
              call: "apps-website.UploadWebsiteImage"
              with:
                "appId": "rest.appId"
                "imageLocation": "rest.imageLocation"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/website/testimonial/{testimonial-id}"
          name: "app-id-website-testimonial-testimonial-id"
          description: "REST surface for EditTestimonial."
          operations:
            - method: POST
              name: "EditTestimonial"
              description: "Flipdish Edit Testimonial"
              call: "apps-website.EditTestimonial"
              with:
                "appId": "rest.appId"
                "testimonialId": "rest.testimonialId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/website/testimonial/{testimonial-id}"
          name: "app-id-website-testimonial-testimonial-id"
          description: "REST surface for DeleteTestimonial."
          operations:
            - method: DELETE
              name: "DeleteTestimonial"
              description: "Flipdish Delete Testimonial"
              call: "apps-website.DeleteTestimonial"
              with:
                "appId": "rest.appId"
                "testimonialId": "rest.testimonialId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/website/image/{image-id}"
          name: "app-id-website-image-image-id"
          description: "REST surface for DeleteWebsiteImage."
          operations:
            - method: DELETE
              name: "DeleteWebsiteImage"
              description: "Flipdish Delete Website Image"
              call: "apps-website.DeleteWebsiteImage"
              with:
                "appId": "rest.appId"
                "imageId": "rest.imageId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "apps-website-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Apps — Website."
      tools:
        - name: "get-index-configuration"
          description: "Flipdish Get Index Configuration"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apps-website.GetIndexConfiguration"
          with:
            "appId": "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "set-index-configuration"
          description: "Flipdish Set Index Configuration"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "apps-website.SetIndexConfiguration"
          with:
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "website_check-now"
          description: "Flipdish Website_Check Now"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apps-website.Website_CheckNow"
          with:
            "appId": "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "add-testimonial"
          description: "Flipdish Add Testimonial"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "apps-website.AddTestimonial"
          with:
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "upload-website-image"
          description: "Flipdish Upload Website Image"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "apps-website.UploadWebsiteImage"
          with:
            "appId": "tools.appId"
            "imageLocation": "tools.imageLocation"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "edit-testimonial"
          description: "Flipdish Edit Testimonial"
          hints:
            readOnly: true
            destructive: false
            idempotent: false
          call: "apps-website.EditTestimonial"
          with:
            "appId": "tools.appId"
            "testimonialId": "tools.testimonialId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "delete-testimonial"
          description: "Flipdish Delete Testimonial"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "apps-website.DeleteTestimonial"
          with:
            "appId": "tools.appId"
            "testimonialId": "tools.testimonialId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "delete-website-image"
          description: "Flipdish Delete Website Image"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "apps-website.DeleteWebsiteImage"
          with:
            "appId": "tools.appId"
            "imageId": "tools.imageId"
          outputParameters:
            - type: object
              mapping: "$."
