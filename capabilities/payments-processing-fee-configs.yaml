naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Payments — ProcessingFeeConfigs"
  description: >-
    ProcessingFeeConfigs operations on the Flipdish Open API v1.0 (1 operations).
    Lead operation: Flipdish Get Processing Fee Configs by Store Ids. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Processing Fee Configs
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "payments-processing-fee-configs"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Payments — ProcessingFeeConfigs business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "processingfeeconfigs"
          path: "/api/v1.0/processingfeeconfigs"
          operations:
            - name: "GetProcessingFeeConfigsByStoreIds"
              method: GET
              description: "Flipdish Get Processing Fee Configs by Store Ids"
              inputParameters:
                - name: "storeIds"
                  in: query
                  type: array
                  required: true
                  description: "The store ids query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "payments-processing-fee-configs-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Payments — ProcessingFeeConfigs."
      resources:
        - path: "/v1/processingfeeconfigs"
          name: "processingfeeconfigs"
          description: "REST surface for GetProcessingFeeConfigsByStoreIds."
          operations:
            - method: GET
              name: "GetProcessingFeeConfigsByStoreIds"
              description: "Flipdish Get Processing Fee Configs by Store Ids"
              call: "payments-processing-fee-configs.GetProcessingFeeConfigsByStoreIds"
              with:
                "storeIds": "rest.storeIds"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "payments-processing-fee-configs-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Payments — ProcessingFeeConfigs."
      tools:
        - name: "get-processing-fee-configs-store"
          description: "Flipdish Get Processing Fee Configs by Store Ids"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-processing-fee-configs.GetProcessingFeeConfigsByStoreIds"
          with:
            "storeIds": "tools.storeIds"
          outputParameters:
            - type: object
              mapping: "$."
