naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Stores — StoreOrderCapacity"
  description: >-
    StoreOrderCapacity operations on the Flipdish Open API v1.0 (2 operations).
    Lead operation: Flipdish Get Store Order Capacity. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Store Order Capacity
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "stores-store-order-capacity"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Stores — StoreOrderCapacity business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-storeordercapacity-store-id-delivery-type"
          path: "/api/v1.0/{appId}/storeordercapacity/{storeId}/{deliveryType}"
          operations:
            - name: "GetStoreOrderCapacity"
              method: GET
              description: "Flipdish Get Store Order Capacity"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
                - name: "deliveryType"
                  in: path
                  type: string
                  required: true
                  description: "The delivery type path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-storeordercapacity-store-id"
          path: "/api/v1.0/{appId}/storeordercapacity/{storeId}"
          operations:
            - name: "UpdateStoreOrderCapacityConfig"
              method: POST
              description: "Flipdish Update Store Order Capacity Config"
              inputParameters:
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
                - name: "deliveryType"
                  in: query
                  type: string
                  required: true
                  description: "The delivery type query parameter."
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "stores-store-order-capacity-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Stores — StoreOrderCapacity."
      resources:
        - path: "/v1/{app-id}/storeordercapacity/{store-id}/{delivery-type}"
          name: "app-id-storeordercapacity-store-id-delivery-type"
          description: "REST surface for GetStoreOrderCapacity."
          operations:
            - method: GET
              name: "GetStoreOrderCapacity"
              description: "Flipdish Get Store Order Capacity"
              call: "stores-store-order-capacity.GetStoreOrderCapacity"
              with:
                "appId": "rest.appId"
                "storeId": "rest.storeId"
                "deliveryType": "rest.deliveryType"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/storeordercapacity/{store-id}"
          name: "app-id-storeordercapacity-store-id"
          description: "REST surface for UpdateStoreOrderCapacityConfig."
          operations:
            - method: POST
              name: "UpdateStoreOrderCapacityConfig"
              description: "Flipdish Update Store Order Capacity Config"
              call: "stores-store-order-capacity.UpdateStoreOrderCapacityConfig"
              with:
                "storeId": "rest.storeId"
                "deliveryType": "rest.deliveryType"
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "stores-store-order-capacity-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Stores — StoreOrderCapacity."
      tools:
        - name: "get-store-order-capacity"
          description: "Flipdish Get Store Order Capacity"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "stores-store-order-capacity.GetStoreOrderCapacity"
          with:
            "appId": "tools.appId"
            "storeId": "tools.storeId"
            "deliveryType": "tools.deliveryType"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "update-store-order-capacity-config"
          description: "Flipdish Update Store Order Capacity Config"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "stores-store-order-capacity.UpdateStoreOrderCapacityConfig"
          with:
            "storeId": "tools.storeId"
            "deliveryType": "tools.deliveryType"
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
