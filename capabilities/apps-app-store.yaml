naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — AppStore"
  description: >-
    AppStore operations on the Flipdish Open API v1.0 (2 operations).
    Lead operation: Flipdish Get App Store App. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - App Store
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "apps-app-store"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Apps — AppStore business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "appstore-apps-app-store-app-id"
          path: "/api/v1.0/appstore/apps/{appStoreAppId}"
          operations:
            - name: "GetAppStoreApp"
              method: GET
              description: "Flipdish Get App Store App"
              inputParameters:
                - name: "appStoreAppId"
                  in: path
                  type: string
                  required: true
                  description: "The app store app id path parameter."
                - name: "appId"
                  in: query
                  type: string
                  required: false
                  description: "The app id query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "appstore-apps"
          path: "/api/v1.0/appstore/apps"
          operations:
            - name: "GetAppStoreApps"
              method: GET
              description: "Flipdish Get App Store Apps"
              inputParameters:
                - name: "search"
                  in: query
                  type: string
                  required: true
                  description: "The search query parameter."
                - name: "page"
                  in: query
                  type: integer
                  required: false
                  description: "The page query parameter."
                - name: "limit"
                  in: query
                  type: integer
                  required: false
                  description: "The limit query parameter."
                - name: "excludeNotOwned"
                  in: query
                  type: boolean
                  required: false
                  description: "The exclude not owned query parameter."
                - name: "showOnlyVerified"
                  in: query
                  type: boolean
                  required: false
                  description: "The show only verified query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "apps-app-store-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Apps — AppStore."
      resources:
        - path: "/v1/appstore/apps/{app-store-app-id}"
          name: "appstore-apps-app-store-app-id"
          description: "REST surface for GetAppStoreApp."
          operations:
            - method: GET
              name: "GetAppStoreApp"
              description: "Flipdish Get App Store App"
              call: "apps-app-store.GetAppStoreApp"
              with:
                "appStoreAppId": "rest.appStoreAppId"
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/appstore/apps"
          name: "appstore-apps"
          description: "REST surface for GetAppStoreApps."
          operations:
            - method: GET
              name: "GetAppStoreApps"
              description: "Flipdish Get App Store Apps"
              call: "apps-app-store.GetAppStoreApps"
              with:
                "search": "rest.search"
                "page": "rest.page"
                "limit": "rest.limit"
                "excludeNotOwned": "rest.excludeNotOwned"
                "showOnlyVerified": "rest.showOnlyVerified"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "apps-app-store-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Apps — AppStore."
      tools:
        - name: "get-app-store-app"
          description: "Flipdish Get App Store App"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apps-app-store.GetAppStoreApp"
          with:
            "appStoreAppId": "tools.appStoreAppId"
            "appId": "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-app-store-apps"
          description: "Flipdish Get App Store Apps"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apps-app-store.GetAppStoreApps"
          with:
            "search": "tools.search"
            "page": "tools.page"
            "limit": "tools.limit"
            "excludeNotOwned": "tools.excludeNotOwned"
            "showOnlyVerified": "tools.showOnlyVerified"
          outputParameters:
            - type: object
              mapping: "$."
