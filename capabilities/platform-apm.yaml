                  mapping: "$."
        - path: "/v1/{app-id}/apm/calls"
          name: "app-id-apm-calls"
          description: "REST surface for GetPaginatedCallList."
          operations:
            - method: GET
              name: "GetPaginatedCallList"
              description: "Flipdish Get Paginated Call List"
              call: "platform-apm.GetPaginatedCallList"
              with:
                "appId": "rest.appId"
                "page": "rest.page"
                "limit": "rest.limit"
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/apm/statistics/calls/{aggregate-data-by}"
          name: "app-id-apm-statistics-calls-aggregate-data-by"
          description: "REST surface for GetCallsStatistics."
          operations:
            - method: GET
              name: "GetCallsStatistics"
              description: "Flipdish Get Calls Statistics"
              call: "platform-apm.GetCallsStatistics"
              with:
                "appId": "rest.appId"
