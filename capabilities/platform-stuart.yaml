naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Stuart"
  description: >-
    Stuart operations on the Flipdish Open API v1.0 (4 operations).
    Lead operation: Flipdish Stuart_Get Stuart Settings. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Stuart
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "platform-stuart"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Platform — Stuart business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "stuart-settings-store-id"
          path: "/api/v1.0/stuart/settings/{storeId}"
          operations:
            - name: "Stuart_GetStuartSettings"
              method: GET
              description: "Flipdish Stuart_Get Stuart Settings"
              inputParameters:
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "stuart-settings-store-id"
          path: "/api/v1.0/stuart/settings/{storeId}"
          operations:
            - name: "Stuart_PostStuartSettings"
              method: POST
              description: "Flipdish Stuart_Post Stuart Settings"
              inputParameters:
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "stuart-jobs-job-id"
          path: "/api/v1.0/stuart/jobs/{jobId}"
          operations:
            - name: "Stuart_GetJob"
              method: GET
              description: "Flipdish Stuart_Get Job"
              inputParameters:
                - name: "jobId"
                  in: path
                  type: integer
                  required: true
                  description: "The job id path parameter."
                - name: "storeId"
                  in: query
                  type: integer
                  required: true
                  description: "The store id query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "stuart-jobs-job-id"
          path: "/api/v1.0/stuart/jobs/{jobId}"
          operations:
            - name: "Stuart_CancelJob"
              method: DELETE
              description: "Flipdish Stuart_Cancel Job"
              inputParameters:
                - name: "jobId"
                  in: path
                  type: integer
                  required: true
                  description: "The job id path parameter."
                - name: "storeId"
                  in: query
                  type: integer
                  required: true
                  description: "The store id query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "platform-stuart-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Platform — Stuart."
      resources:
        - path: "/v1/stuart/settings/{store-id}"
          name: "stuart-settings-store-id"
          description: "REST surface for Stuart_GetStuartSettings."
          operations:
            - method: GET
              name: "Stuart_GetStuartSettings"
              description: "Flipdish Stuart_Get Stuart Settings"
              call: "platform-stuart.Stuart_GetStuartSettings"
              with:
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/stuart/settings/{store-id}"
          name: "stuart-settings-store-id"
          description: "REST surface for Stuart_PostStuartSettings."
          operations:
            - method: POST
              name: "Stuart_PostStuartSettings"
              description: "Flipdish Stuart_Post Stuart Settings"
              call: "platform-stuart.Stuart_PostStuartSettings"
              with:
                "storeId": "rest.storeId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/stuart/jobs/{job-id}"
          name: "stuart-jobs-job-id"
          description: "REST surface for Stuart_GetJob."
          operations:
            - method: GET
              name: "Stuart_GetJob"
              description: "Flipdish Stuart_Get Job"
              call: "platform-stuart.Stuart_GetJob"
              with:
                "jobId": "rest.jobId"
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/stuart/jobs/{job-id}"
          name: "stuart-jobs-job-id"
          description: "REST surface for Stuart_CancelJob."
          operations:
            - method: DELETE
              name: "Stuart_CancelJob"
              description: "Flipdish Stuart_Cancel Job"
              call: "platform-stuart.Stuart_CancelJob"
              with:
                "jobId": "rest.jobId"
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "platform-stuart-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Platform — Stuart."
      tools:
        - name: "stuart_get-stuart-settings"
          description: "Flipdish Stuart_Get Stuart Settings"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-stuart.Stuart_GetStuartSettings"
          with:
            "storeId": "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "stuart_post-stuart-settings"
          description: "Flipdish Stuart_Post Stuart Settings"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "platform-stuart.Stuart_PostStuartSettings"
          with:
            "storeId": "tools.storeId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "stuart_get-job"
          description: "Flipdish Stuart_Get Job"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-stuart.Stuart_GetJob"
          with:
            "jobId": "tools.jobId"
            "storeId": "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "stuart_cancel-job"
          description: "Flipdish Stuart_Cancel Job"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "platform-stuart.Stuart_CancelJob"
          with:
            "jobId": "tools.jobId"
            "storeId": "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
