              name: "PublishPendingMenuChanges"
              description: "Flipdish Publish Pending Menu Changes"
              call: "catalog-catalog-changes.PublishPendingMenuChanges"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "catalog-catalog-changes-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Catalog — CatalogChanges."
      tools:
        - name: "get-pending-menu-changes-summaries"
          description: "Flipdish Get Pending Menu Changes Summaries"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "catalog-catalog-changes.GetPendingMenuChangesSummaries"
