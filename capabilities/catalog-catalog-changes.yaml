naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Catalog — CatalogChanges"
  description: >-
    CatalogChanges operations on the Flipdish Open API v1.0 (3 operations).
    Lead operation: Flipdish Get Pending Menu Changes Summaries. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Catalog Changes
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "catalog-catalog-changes"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Catalog — CatalogChanges business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-menus-catalog-changes-summaries"
          path: "/api/v1.0/{appId}/menus/catalog-changes/summaries"
          operations:
            - name: "GetPendingMenuChangesSummaries"
              method: GET
              description: "Flipdish Get Pending Menu Changes Summaries"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-menus-catalog-changes"
          path: "/api/v1.0/{appId}/menus/catalog-changes"
          operations:
            - name: "GetPendingMenuChanges"
              method: GET
              description: "Flipdish Get Pending Menu Changes"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "menuId"
                  in: query
                  type: integer
                  required: false
                  description: "The menu id query parameter."
                - name: "catalogItemId"
                  in: query
                  type: string
                  required: false
                  description: "The catalog item id query parameter."
                - name: "page"
                  in: query
                  type: integer
                  required: false
                  description: "The page query parameter."
                - name: "limit"
                  in: query
                  type: integer
                  required: false
                  description: "The limit query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-menus-catalog-changes-publish"
          path: "/api/v1.0/{appId}/menus/catalog-changes/publish"
          operations:
            - name: "PublishPendingMenuChanges"
              method: POST
              description: "Flipdish Publish Pending Menu Changes"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "catalog-catalog-changes-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Catalog — CatalogChanges."
      resources:
        - path: "/v1/{app-id}/menus/catalog-changes/summaries"
          name: "app-id-menus-catalog-changes-summaries"
          description: "REST surface for GetPendingMenuChangesSummaries."
          operations:
            - method: GET
              name: "GetPendingMenuChangesSummaries"
              description: "Flipdish Get Pending Menu Changes Summaries"
              call: "catalog-catalog-changes.GetPendingMenuChangesSummaries"
              with:
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/menus/catalog-changes"
          name: "app-id-menus-catalog-changes"
          description: "REST surface for GetPendingMenuChanges."
          operations:
            - method: GET
              name: "GetPendingMenuChanges"
              description: "Flipdish Get Pending Menu Changes"
              call: "catalog-catalog-changes.GetPendingMenuChanges"
              with:
