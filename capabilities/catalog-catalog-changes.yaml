            "menuId": "tools.menuId"
            "catalogItemId": "tools.catalogItemId"
            "page": "tools.page"
            "limit": "tools.limit"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "publish-pending-menu-changes"
          description: "Flipdish Publish Pending Menu Changes"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "catalog-catalog-changes.PublishPendingMenuChanges"
          with:
            "appId": "tools.appId"
            body: "tools.body"
