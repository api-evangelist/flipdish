naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — FirebaseApps"
  description: >-
    FirebaseApps operations on the Flipdish Open API v1.0 (3 operations).
    Lead operation: Flipdish Firebase Apps_Get Firebase App. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Firebase Apps
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "apps-firebase-apps"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Apps — FirebaseApps business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "firebase-app-whitelabel-id"
          path: "/api/v1.0/FirebaseApp/{whitelabelId}"
          operations:
            - name: "FirebaseApps_GetFirebaseApp"
              method: GET
              description: "Flipdish Firebase Apps_Get Firebase App"
              inputParameters:
                - name: "whitelabelId"
                  in: path
                  type: integer
                  required: true
                  description: "The whitelabel id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "firebase-app"
          path: "/api/v1.0/FirebaseApp"
          operations:
            - name: "FirebaseApps_AddFirebaseApp"
              method: POST
              description: "Flipdish Firebase Apps_Add Firebase App"
              inputParameters:
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "firebase-app-white-label-id"
          path: "/api/v1.0/FirebaseApp/{whiteLabelId}"
          operations:
            - name: "FirebaseApps_DeleteFirebaseApp"
              method: DELETE
              description: "Flipdish Firebase Apps_Delete Firebase App"
              inputParameters:
                - name: "whiteLabelId"
                  in: path
                  type: integer
                  required: true
                  description: "The white label id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "apps-firebase-apps-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Apps — FirebaseApps."
      resources:
        - path: "/v1/firebase-app/{whitelabel-id}"
          name: "firebase-app-whitelabel-id"
          description: "REST surface for FirebaseApps_GetFirebaseApp."
          operations:
            - method: GET
              name: "FirebaseApps_GetFirebaseApp"
              description: "Flipdish Firebase Apps_Get Firebase App"
              call: "apps-firebase-apps.FirebaseApps_GetFirebaseApp"
              with:
                "whitelabelId": "rest.whitelabelId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/firebase-app"
          name: "firebase-app"
          description: "REST surface for FirebaseApps_AddFirebaseApp."
          operations:
            - method: POST
              name: "FirebaseApps_AddFirebaseApp"
              description: "Flipdish Firebase Apps_Add Firebase App"
              call: "apps-firebase-apps.FirebaseApps_AddFirebaseApp"
              with:
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/firebase-app/{white-label-id}"
          name: "firebase-app-white-label-id"
          description: "REST surface for FirebaseApps_DeleteFirebaseApp."
          operations:
            - method: DELETE
              name: "FirebaseApps_DeleteFirebaseApp"
              description: "Flipdish Firebase Apps_Delete Firebase App"
              call: "apps-firebase-apps.FirebaseApps_DeleteFirebaseApp"
              with:
                "whiteLabelId": "rest.whiteLabelId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "apps-firebase-apps-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Apps — FirebaseApps."
      tools:
        - name: "firebase-apps_get-firebase-app"
          description: "Flipdish Firebase Apps_Get Firebase App"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apps-firebase-apps.FirebaseApps_GetFirebaseApp"
          with:
            "whitelabelId": "tools.whitelabelId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "firebase-apps_add-firebase-app"
          description: "Flipdish Firebase Apps_Add Firebase App"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "apps-firebase-apps.FirebaseApps_AddFirebaseApp"
          with:
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "firebase-apps_delete-firebase-app"
          description: "Flipdish Firebase Apps_Delete Firebase App"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "apps-firebase-apps.FirebaseApps_DeleteFirebaseApp"
          with:
            "whiteLabelId": "tools.whiteLabelId"
          outputParameters:
            - type: object
              mapping: "$."
