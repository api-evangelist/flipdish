      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Apps — AppStoreConfigurations business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-appstore-apps"
          path: "/api/v1.0/{appId}/appstore/apps"
          operations:
            - name: "GetConfiguredApps"
              method: GET
              description: "Flipdish Get Configured Apps"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-appstore-apps-app-store-app-id"
          path: "/api/v1.0/{appId}/appstore/apps/{appStoreAppId}"
          operations:
            - name: "GetConfiguredAppSingleApp"
              method: GET
              description: "Flipdish Get Configured App Single App"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "appStoreAppId"
                  in: path
                  type: string
                  required: true
                  description: "The app store app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "appstore-oauthresponse-app-store-app-id-responsecode"
