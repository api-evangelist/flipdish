          operations:
            - name: "AppStoreConfigurations_AppStoreHandleOauthResponseCode"
              method: GET
              description: "Flipdish App Store Configurations_App Store Handle Oauth Response Code"
              inputParameters:
                - name: "appStoreAppId"
                  in: path
                  type: string
                  required: true
                  description: "The app store app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-appstore-apps-app-store-app-id-config-config-id"
          path: "/api/v1.0/{appId}/appstore/apps/{appStoreAppId}/config/{configId}"
          operations:
            - name: "GetAppStoreConfig"
              method: GET
