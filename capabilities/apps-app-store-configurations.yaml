              method: DELETE
              description: "Flipdish Delete App Store Config"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "appStoreAppId"
                  in: path
                  type: string
                  required: true
                  description: "The app store app id path parameter."
                - name: "configId"
                  in: path
                  type: string
                  required: true
                  description: "The config id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
