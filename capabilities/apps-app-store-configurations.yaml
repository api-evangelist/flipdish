                - name: "appStoreAppId"
                  in: path
                  type: string
                  required: true
                  description: "The app store app id path parameter."
                - name: "configId"
                  in: path
                  type: string
                  required: true
                  description: "The config id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
