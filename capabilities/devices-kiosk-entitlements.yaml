naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Devices — KioskEntitlements"
  description: >-
    KioskEntitlements operations on the Flipdish Open API v1.0 (1 operations).
    Lead operation: Flipdish Query Kiosk Entitlements by Org Id. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Kiosk Entitlements
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "devices-kiosk-entitlements"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Devices — KioskEntitlements business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "orgs-org-id-kiosk-entitlements"
          path: "/api/v1.0/orgs/{orgId}/kiosk/entitlements"
          operations:
            - name: "QueryKioskEntitlementsByOrgId"
              method: GET
              description: "Flipdish Query Kiosk Entitlements by Org Id"
              inputParameters:
                - name: "orgId"
                  in: path
                  type: string
                  required: true
                  description: "The org id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "devices-kiosk-entitlements-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Devices — KioskEntitlements."
      resources:
        - path: "/v1/orgs/{org-id}/kiosk/entitlements"
          name: "orgs-org-id-kiosk-entitlements"
          description: "REST surface for QueryKioskEntitlementsByOrgId."
          operations:
            - method: GET
              name: "QueryKioskEntitlementsByOrgId"
              description: "Flipdish Query Kiosk Entitlements by Org Id"
              call: "devices-kiosk-entitlements.QueryKioskEntitlementsByOrgId"
              with:
                "orgId": "rest.orgId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "devices-kiosk-entitlements-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Devices — KioskEntitlements."
      tools:
        - name: "query-kiosk-entitlements-org-id"
          description: "Flipdish Query Kiosk Entitlements by Org Id"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "devices-kiosk-entitlements.QueryKioskEntitlementsByOrgId"
          with:
            "orgId": "tools.orgId"
          outputParameters:
            - type: object
              mapping: "$."
