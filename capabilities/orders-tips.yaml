naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Orders — Tips"
  description: >-
    Tips operations on the Flipdish Open API v1.0 (2 operations).
    Lead operation: Flipdish Tip Config.Get. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Tips
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "orders-tips"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Orders — Tips business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "stores-store-id-tipconfig"
          path: "/api/v1.0/stores/{storeId}/tipconfig"
          operations:
            - name: "TipConfig.Get"
              method: GET
              description: "Flipdish Tip Config.Get"
              inputParameters:
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "stores-store-id-tipconfig"
          path: "/api/v1.0/stores/{storeId}/tipconfig"
          operations:
            - name: "TipConfig.Upsert"
              method: POST
              description: "Flipdish Tip Config.Upsert"
              inputParameters:
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
                  description: "The store id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "orders-tips-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Orders — Tips."
      resources:
        - path: "/v1/stores/{store-id}/tipconfig"
          name: "stores-store-id-tipconfig"
          description: "REST surface for TipConfig.Get."
          operations:
            - method: GET
              name: "TipConfig.Get"
              description: "Flipdish Tip Config.Get"
              call: "orders-tips.TipConfig.Get"
              with:
                "storeId": "rest.storeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/stores/{store-id}/tipconfig"
          name: "stores-store-id-tipconfig"
          description: "REST surface for TipConfig.Upsert."
          operations:
            - method: POST
              name: "TipConfig.Upsert"
              description: "Flipdish Tip Config.Upsert"
              call: "orders-tips.TipConfig.Upsert"
              with:
                "storeId": "rest.storeId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "orders-tips-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Orders — Tips."
      tools:
        - name: "tip-config.get"
          description: "Flipdish Tip Config.Get"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "orders-tips.TipConfig.Get"
          with:
            "storeId": "tools.storeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "tip-config.upsert"
          description: "Flipdish Tip Config.Upsert"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "orders-tips.TipConfig.Upsert"
          with:
            "storeId": "tools.storeId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
