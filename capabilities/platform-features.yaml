naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Features"
  description: >-
    Features operations on the Flipdish Open API v1.0 (2 operations).
    Lead operation: Flipdish Enable Features. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Features
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "platform-features"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Platform — Features business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-features-enable"
          path: "/api/v1.0/{appId}/features/enable"
          operations:
            - name: "EnableFeatures"
              method: POST
              description: "Flipdish Enable Features"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-features-disable"
          path: "/api/v1.0/{appId}/features/disable"
          operations:
            - name: "DisableFeatures"
              method: POST
              description: "Flipdish Disable Features"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "platform-features-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Platform — Features."
      resources:
        - path: "/v1/{app-id}/features/enable"
          name: "app-id-features-enable"
          description: "REST surface for EnableFeatures."
          operations:
            - method: POST
              name: "EnableFeatures"
              description: "Flipdish Enable Features"
              call: "platform-features.EnableFeatures"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/features/disable"
          name: "app-id-features-disable"
          description: "REST surface for DisableFeatures."
          operations:
            - method: POST
              name: "DisableFeatures"
              description: "Flipdish Disable Features"
              call: "platform-features.DisableFeatures"
              with:
                "appId": "rest.appId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "platform-features-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Platform — Features."
      tools:
        - name: "enable-features"
          description: "Flipdish Enable Features"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "platform-features.EnableFeatures"
          with:
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "disable-features"
          description: "Flipdish Disable Features"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "platform-features.DisableFeatures"
          with:
            "appId": "tools.appId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
