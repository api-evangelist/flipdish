naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Payments — Receipts"
  description: >-
    Receipts operations on the Flipdish Open API v1.0 (1 operations).
    Lead operation: Flipdish Get Receipt. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Receipts
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "payments-receipts"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Payments — Receipts business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "receipts-order-id"
          path: "/api/v1.0/receipts/{orderId}"
          operations:
            - name: "GetReceipt"
              method: GET
              description: "Flipdish Get Receipt"
              inputParameters:
                - name: "orderId"
                  in: path
                  type: integer
                  required: true
                  description: "The order id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "payments-receipts-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Payments — Receipts."
      resources:
        - path: "/v1/receipts/{order-id}"
          name: "receipts-order-id"
          description: "REST surface for GetReceipt."
          operations:
            - method: GET
              name: "GetReceipt"
              description: "Flipdish Get Receipt"
              call: "payments-receipts.GetReceipt"
              with:
                "orderId": "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "payments-receipts-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Payments — Receipts."
      tools:
        - name: "get-receipt"
          description: "Flipdish Get Receipt"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-receipts.GetReceipt"
          with:
            "orderId": "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
