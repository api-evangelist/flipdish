naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Webhooks"
  description: >-
    Webhooks operations on the Flipdish Open API v1.0 (10 operations).
    Lead operation: Flipdish Get Webhook Event Names. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Webhooks
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "platform-webhooks"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Platform — Webhooks business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-webhooks-events"
          path: "/api/v1.0/{appId}/webhooks/events"
          operations:
            - name: "GetWebhookEventNames"
              method: GET
              description: "Flipdish Get Webhook Event Names"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-webhooks-oauth-app-id-subscriptions"
          path: "/api/v1.0/{appId}/webhooks/{oauthAppId}/subscriptions"
          operations:
            - name: "GetWebhookSubscriptions"
              method: GET
              description: "Flipdish Get Webhook Subscriptions"
              inputParameters:
                - name: "oauthAppId"
                  in: path
                  type: string
                  required: true
                  description: "The oauth app id path parameter."
                - name: "page"
                  in: query
                  type: integer
                  required: false
                  description: "The page query parameter."
                - name: "limit"
                  in: query
                  type: integer
                  required: false
                  description: "The limit query parameter."
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
