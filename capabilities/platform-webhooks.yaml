          path: "/api/v1.0/{appId}/webhooks/{oauthAppId}/subscriptions"
          operations:
            - name: "CreateWebhookSubscription"
              method: POST
              description: "Flipdish Create Webhook Subscription"
              inputParameters:
                - name: "oauthAppId"
                  in: path
                  type: string
                  required: true
                  description: "The oauth app id path parameter."
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
