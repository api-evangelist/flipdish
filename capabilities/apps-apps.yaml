          path: "/api/v1.0/apps/{appId}"
          operations:
            - name: "GetApp"
              method: GET
              description: "Flipdish Get App"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "apps-app-id-name"
          path: "/api/v1.0/apps/{appId}/name"
          operations:
            - name: "GetAppName"
              method: GET
              description: "Flipdish Get App Name"
              inputParameters:
