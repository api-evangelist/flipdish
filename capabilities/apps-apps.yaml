              method: GET
              description: "Flipdish Get Compliance"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "apps-app-id-compliance"
