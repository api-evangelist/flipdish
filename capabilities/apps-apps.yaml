          operations:
            - name: "SetCompliance"
              method: POST
              description: "Flipdish Set Compliance"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "complianceType"
                  in: query
                  type: string
                  required: true
                  description: "The compliance type query parameter."
