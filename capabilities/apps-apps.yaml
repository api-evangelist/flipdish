naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — Apps"
  description: >-
    Apps operations on the Flipdish Open API v1.0 (21 operations).
    Lead operation: Flipdish Get App. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Apps
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

