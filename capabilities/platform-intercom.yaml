naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Intercom"
  description: >-
    Intercom operations on the Flipdish Open API v1.0 (1 operations).
    Lead operation: Flipdish User Hash. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Intercom
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "platform-intercom"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Platform — Intercom business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "intercom-user-hash"
          path: "/api/v1.0/intercom/userHash"
          operations:
            - name: "UserHash"
              method: GET
              description: "Flipdish User Hash"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "platform-intercom-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Platform — Intercom."
      resources:
        - path: "/v1/intercom/user-hash"
          name: "intercom-user-hash"
          description: "REST surface for UserHash."
          operations:
            - method: GET
              name: "UserHash"
              description: "Flipdish User Hash"
              call: "platform-intercom.UserHash"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "platform-intercom-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Platform — Intercom."
      tools:
        - name: "user-hash"
          description: "Flipdish User Hash"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-intercom.UserHash"
          outputParameters:
            - type: object
              mapping: "$."
