naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Clients"
  description: >-
    Clients operations on the Flipdish Open API v1.0 (3 operations).
    Lead operation: Flipdish Get Client. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Clients
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "platform-clients"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Platform — Clients business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "clients-client-id"
          path: "/api/v1.0/clients/{clientId}"
          operations:
            - name: "GetClient"
              method: GET
              description: "Flipdish Get Client"
              inputParameters:
                - name: "clientId"
                  in: path
                  type: integer
                  required: true
                  description: "The client id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "clients-client-id-stripecustomerid"
          path: "/api/v1.0/clients/{clientId}/stripecustomerid"
          operations:
            - name: "SetStripeCustomerId"
              method: POST
              description: "Flipdish Set Stripe Customer Id"
              inputParameters:
                - name: "clientId"
                  in: path
                  type: integer
                  required: true
                  description: "The client id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "clients-client-id-salesforcecontactid"
          path: "/api/v1.0/clients/{clientId}/salesforcecontactid"
          operations:
            - name: "SetSalesForceContactId"
              method: POST
              description: "Flipdish Set Sales Force Contact Id"
              inputParameters:
                - name: "clientId"
                  in: path
                  type: integer
                  required: true
                  description: "The client id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "platform-clients-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Platform — Clients."
      resources:
        - path: "/v1/clients/{client-id}"
          name: "clients-client-id"
          description: "REST surface for GetClient."
          operations:
            - method: GET
              name: "GetClient"
              description: "Flipdish Get Client"
              call: "platform-clients.GetClient"
              with:
                "clientId": "rest.clientId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/clients/{client-id}/stripecustomerid"
          name: "clients-client-id-stripecustomerid"
          description: "REST surface for SetStripeCustomerId."
          operations:
            - method: POST
              name: "SetStripeCustomerId"
              description: "Flipdish Set Stripe Customer Id"
              call: "platform-clients.SetStripeCustomerId"
              with:
                "clientId": "rest.clientId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/clients/{client-id}/salesforcecontactid"
          name: "clients-client-id-salesforcecontactid"
          description: "REST surface for SetSalesForceContactId."
          operations:
            - method: POST
              name: "SetSalesForceContactId"
              description: "Flipdish Set Sales Force Contact Id"
              call: "platform-clients.SetSalesForceContactId"
              with:
                "clientId": "rest.clientId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "platform-clients-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Platform — Clients."
      tools:
        - name: "get-client"
          description: "Flipdish Get Client"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-clients.GetClient"
          with:
            "clientId": "tools.clientId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "set-stripe-customer-id"
          description: "Flipdish Set Stripe Customer Id"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "platform-clients.SetStripeCustomerId"
          with:
            "clientId": "tools.clientId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "set-sales-force-contact-id"
          description: "Flipdish Set Sales Force Contact Id"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "platform-clients.SetSalesForceContactId"
          with:
            "clientId": "tools.clientId"
            body: "tools.body"
          outputParameters:
            - type: object
              mapping: "$."
