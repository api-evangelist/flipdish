      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Apps — MobileApps."
      tools:
        - name: "get-submission-details"
          description: "Flipdish Get Submission Details"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apps-mobile-apps.GetSubmissionDetails"
          with:
            "appId": "tools.appId"
          outputParameters:
