        - path: "/v1/mobileapps/{app-id}/submission/{submission-id}/status"
          name: "mobileapps-app-id-submission-submission-id-status"
          description: "REST surface for UpdateSubmissionStatus."
          operations:
            - method: POST
              name: "UpdateSubmissionStatus"
              description: "Flipdish Update Submission Status"
              call: "apps-mobile-apps.UpdateSubmissionStatus"
              with:
                "appId": "rest.appId"
                "submissionId": "rest.submissionId"
                body: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/mobileapps/{app-id}/statistics"
