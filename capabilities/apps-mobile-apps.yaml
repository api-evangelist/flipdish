naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — MobileApps"
  description: >-
    MobileApps operations on the Flipdish Open API v1.0 (11 operations).
    Lead operation: Flipdish Get Submission Details. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Mobile Apps
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "apps-mobile-apps"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Apps — MobileApps business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "mobileapps-app-id-submission-details"
          path: "/api/v1.0/mobileapps/{appId}/submission/details"
          operations:
            - name: "GetSubmissionDetails"
              method: GET
              description: "Flipdish Get Submission Details"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-saleschannel-details"
          path: "/api/v1.0/mobileapps/{appId}/saleschannel/details"
          operations:
            - name: "GetAppConfigSalesChannel"
              method: GET
              description: "Flipdish Get App Config Sales Channel"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-submission-submission-id-status"
          path: "/api/v1.0/mobileapps/{appId}/submission/{submissionId}/status"
          operations:
            - name: "GetSubmissionStatus"
              method: GET
              description: "Flipdish Get Submission Status"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "submissionId"
                  in: path
                  type: integer
                  required: true
                  description: "The submission id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-submission-submission-id-status"
          path: "/api/v1.0/mobileapps/{appId}/submission/{submissionId}/status"
          operations:
            - name: "UpdateSubmissionStatus"
              method: POST
              description: "Flipdish Update Submission Status"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "submissionId"
                  in: path
                  type: integer
                  required: true
                  description: "The submission id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-statistics"
          path: "/api/v1.0/mobileapps/{appId}/statistics"
          operations:
            - name: "GetStatistics"
              method: GET
              description: "Flipdish Get Statistics"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "platformTypes"
                  in: query
                  type: array
                  required: true
                  description: "The platform types query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-submission"
          path: "/api/v1.0/mobileapps/{appId}/submission"
          operations:
            - name: "Submission"
              method: POST
              description: "Flipdish Submission"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-resubmission"
          path: "/api/v1.0/mobileapps/{appId}/resubmission"
          operations:
            - name: "Resubmission"
              method: POST
              description: "Flipdish Resubmission"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-saleschannel"
          path: "/api/v1.0/mobileapps/{appId}/saleschannel"
          operations:
            - name: "UpdateAppConfigSalesChannel"
              method: POST
              description: "Flipdish Update App Config Sales Channel"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-submission-image"
          path: "/api/v1.0/mobileapps/{appId}/submission/image"
          operations:
            - name: "UploadImage"
              method: POST
              description: "Flipdish Upload Image"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-submission-submission-id-publish"
          path: "/api/v1.0/mobileapps/{appId}/submission/{submissionId}/publish"
          operations:
            - name: "Publish"
              method: POST
              description: "Flipdish Publish"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "submissionId"
                  in: path
                  type: integer
                  required: true
                  description: "The submission id path parameter."
                - name: "platformType"
                  in: query
                  type: string
                  required: false
                  description: "The platform type query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "mobileapps-app-id-submission-submission-id-unpublish"
          path: "/api/v1.0/mobileapps/{appId}/submission/{submissionId}/unpublish"
          operations:
            - name: "Unpublish"
              method: POST
              description: "Flipdish Unpublish"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "submissionId"
                  in: path
                  type: integer
                  required: true
                  description: "The submission id path parameter."
                - name: "platformType"
                  in: query
                  type: string
                  required: false
                  description: "The platform type query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
