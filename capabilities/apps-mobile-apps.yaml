              mapping: "$."
        - name: "get-app-config-sales-channel"
          description: "Flipdish Get App Config Sales Channel"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "apps-mobile-apps.GetAppConfigSalesChannel"
          with:
