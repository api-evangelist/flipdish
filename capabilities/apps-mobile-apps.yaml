      namespace: "apps-mobile-apps-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Apps — MobileApps."
      resources:
        - path: "/v1/mobileapps/{app-id}/submission/details"
          name: "mobileapps-app-id-submission-details"
          description: "REST surface for GetSubmissionDetails."
          operations:
            - method: GET
              name: "GetSubmissionDetails"
              description: "Flipdish Get Submission Details"
              call: "apps-mobile-apps.GetSubmissionDetails"
              with:
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/mobileapps/{app-id}/saleschannel/details"
          name: "mobileapps-app-id-saleschannel-details"
          description: "REST surface for GetAppConfigSalesChannel."
          operations:
