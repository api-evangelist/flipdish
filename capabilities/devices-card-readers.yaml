naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Devices — CardReaders"
  description: >-
    CardReaders operations on the Flipdish Open API v1.0 (13 operations).
    Lead operation: Flipdish Get Stripe Connection Token. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Card Readers
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

