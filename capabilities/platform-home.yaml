naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Home"
  description: >-
    Home operations on the Flipdish Open API v1.0 (4 operations).
    Lead operation: Flipdish Get Home Actions. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Home
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "platform-home"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Platform — Home business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-home"
          path: "/api/v1.0/{appId}/home"
          operations:
            - name: "GetHomeActions"
              method: GET
              description: "Flipdish Get Home Actions"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "home-okta-portal"
          path: "/api/v1.0/home/okta-portal"
          operations:
            - name: "GetOktaPortalFeatureFlag"
              method: GET
              description: "Flipdish Get Okta Portal Feature Flag"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-home-stats"
          path: "/api/v1.0/{appId}/home/stats"
          operations:
            - name: "GetHomeStatistics"
              method: GET
              description: "Flipdish Get Home Statistics"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-home-home-action-id"
          path: "/api/v1.0/{appId}/home/{homeActionId}"
          operations:
            - name: "CompleteHomeAction"
              method: POST
              description: "Flipdish Complete Home Action"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "homeActionId"
                  in: path
                  type: integer
                  required: true
                  description: "The home action id path parameter."
                - name: "isDismissed"
                  in: query
                  type: boolean
                  required: true
                  description: "The is dismissed query parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "platform-home-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Platform — Home."
      resources:
        - path: "/v1/{app-id}/home"
          name: "app-id-home"
          description: "REST surface for GetHomeActions."
          operations:
            - method: GET
              name: "GetHomeActions"
              description: "Flipdish Get Home Actions"
              call: "platform-home.GetHomeActions"
              with:
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/home/okta-portal"
          name: "home-okta-portal"
          description: "REST surface for GetOktaPortalFeatureFlag."
          operations:
            - method: GET
              name: "GetOktaPortalFeatureFlag"
              description: "Flipdish Get Okta Portal Feature Flag"
              call: "platform-home.GetOktaPortalFeatureFlag"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/home/stats"
          name: "app-id-home-stats"
          description: "REST surface for GetHomeStatistics."
          operations:
            - method: GET
              name: "GetHomeStatistics"
              description: "Flipdish Get Home Statistics"
              call: "platform-home.GetHomeStatistics"
              with:
                "appId": "rest.appId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/{app-id}/home/{home-action-id}"
          name: "app-id-home-home-action-id"
          description: "REST surface for CompleteHomeAction."
          operations:
            - method: POST
              name: "CompleteHomeAction"
              description: "Flipdish Complete Home Action"
              call: "platform-home.CompleteHomeAction"
              with:
                "appId": "rest.appId"
                "homeActionId": "rest.homeActionId"
                "isDismissed": "rest.isDismissed"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "platform-home-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Platform — Home."
      tools:
        - name: "get-home-actions"
          description: "Flipdish Get Home Actions"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-home.GetHomeActions"
          with:
            "appId": "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-okta-portal-feature-flag"
          description: "Flipdish Get Okta Portal Feature Flag"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-home.GetOktaPortalFeatureFlag"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "get-home-statistics"
          description: "Flipdish Get Home Statistics"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "platform-home.GetHomeStatistics"
          with:
            "appId": "tools.appId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "complete-home-action"
          description: "Flipdish Complete Home Action"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "platform-home.CompleteHomeAction"
          with:
            "appId": "tools.appId"
            "homeActionId": "tools.homeActionId"
            "isDismissed": "tools.isDismissed"
          outputParameters:
            - type: object
              mapping: "$."
