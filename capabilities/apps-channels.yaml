                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: "channelId"
                  in: path
                  type: integer
                  required: true
                  description: "The channel id path parameter."
                - name: "storeId"
                  in: path
                  type: integer
                  required: true
