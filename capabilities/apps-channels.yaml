naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — Channels"
  description: >-
    Channels operations on the Flipdish Open API v1.0 (12 operations).
    Lead operation: Flipdish Get Channels. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Channels
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "apps-channels"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Apps — Channels business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-channels"
          path: "/api/v1.0/{appId}/channels"
          operations:
            - name: "GetChannels"
              method: GET
              description: "Flipdish Get Channels"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-channels-id"
          path: "/api/v1.0/{appId}/channels/{id}"
          operations:
            - name: "GetChannel"
              method: GET
              description: "Flipdish Get Channel"
              inputParameters:
                - name: "id"
                  in: path
                  type: integer
                  required: true
                  description: "The id path parameter."
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-channels-assigned-channels"
          path: "/api/v1.0/{appId}/channels/assigned-channels"
          operations:
            - name: "GetAssignedChannels"
