              description: "Flipdish Get Assigned Channels"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-channels-available-channels"
          path: "/api/v1.0/{appId}/channels/available-channels"
          operations:
            - name: "GetAvailableChannels"
              method: GET
              description: "Flipdish Get Available Channels"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-channels-channel-id-stores"
          path: "/api/v1.0/{appId}/channels/{channelId}/stores"
          operations:
            - name: "GetStoresBySalesChannel"
              method: GET
