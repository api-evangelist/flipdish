      port: 8080
      description: "REST adapter for Flipdish API - Apps — WhiteLabelConfig."
      resources:
        - path: "/v1/whitelabelconfig/health"
          name: "whitelabelconfig-health"
          description: "REST surface for HealthCheck."
          operations:
            - method: GET
              name: "HealthCheck"
              description: "Flipdish Health Check"
              call: "apps-white-label-config.HealthCheck"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/whitelabelconfig/id/{wlid}"
          name: "whitelabelconfig-id-wlid"
          description: "REST surface for GetWhiteLabelConfig."
          operations:
            - method: GET
              name: "GetWhiteLabelConfig"
              description: "Flipdish Get White Label Config"
              call: "apps-white-label-config.GetWhiteLabelConfig"
