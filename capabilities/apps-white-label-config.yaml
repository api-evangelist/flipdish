        - path: "/v1/whitelabelconfig/{app-id}/appstore"
          name: "whitelabelconfig-app-id-appstore"
          description: "REST surface for UpdateAppStoreConfig."
          operations:
            - method: POST
              name: "UpdateAppStoreConfig"
