        - path: "/v1/whitelabelconfig/{app-id}/general"
          name: "whitelabelconfig-app-id-general"
          description: "REST surface for UpdateAppGeneralConfig."
          operations:
            - method: POST
              name: "UpdateAppGeneralConfig"
              description: "Flipdish Update App General Config"
              call: "apps-white-label-config.UpdateAppGeneralConfig"
