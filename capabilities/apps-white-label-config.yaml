        - path: "/v1/whitelabelconfig/{app-id}/playstore"
          name: "whitelabelconfig-app-id-playstore"
          description: "REST surface for GetPlayStoreConfig."
          operations:
            - method: GET
              name: "GetPlayStoreConfig"
              description: "Flipdish Get Play Store Config"
              call: "apps-white-label-config.GetPlayStoreConfig"
              with:
                "appId": "rest.appId"
              outputParameters:
