naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — WhiteLabelConfig"
  description: >-
    WhiteLabelConfig operations on the Flipdish Open API v1.0 (10 operations).
    Lead operation: Flipdish Health Check. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - White Label Config
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "apps-white-label-config"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Apps — WhiteLabelConfig business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "whitelabelconfig-health"
          path: "/api/v1.0/whitelabelconfig/health"
          operations:
            - name: "HealthCheck"
              method: GET
              description: "Flipdish Health Check"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-id-wlid"
          path: "/api/v1.0/whitelabelconfig/id/{wlid}"
          operations:
            - name: "GetWhiteLabelConfig"
              method: GET
              description: "Flipdish Get White Label Config"
              inputParameters:
                - name: "wlid"
                  in: path
                  type: integer
                  required: true
                  description: "The wlid path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-name-app-id"
          path: "/api/v1.0/whitelabelconfig/name/{appId}"
          operations:
            - name: "GetWhiteLabelConfigByAppNameId"
              method: GET
              description: "Flipdish Get White Label Config by App Name Id"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-app-id-general"
          path: "/api/v1.0/whitelabelconfig/{appId}/general"
          operations:
            - name: "GetAppGeneralConfig"
              method: GET
              description: "Flipdish Get App General Config"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-app-id-general"
          path: "/api/v1.0/whitelabelconfig/{appId}/general"
          operations:
            - name: "UpdateAppGeneralConfig"
              method: POST
              description: "Flipdish Update App General Config"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-app-id-appstore"
          path: "/api/v1.0/whitelabelconfig/{appId}/appstore"
          operations:
            - name: "GetAppStoreConfig"
              method: GET
              description: "Flipdish Get App Store Config"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-app-id-appstore"
          path: "/api/v1.0/whitelabelconfig/{appId}/appstore"
          operations:
            - name: "UpdateAppStoreConfig"
              method: POST
              description: "Flipdish Update App Store Config"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-app-id-playstore"
          path: "/api/v1.0/whitelabelconfig/{appId}/playstore"
          operations:
            - name: "GetPlayStoreConfig"
              method: GET
              description: "Flipdish Get Play Store Config"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-app-id-playstore"
          path: "/api/v1.0/whitelabelconfig/{appId}/playstore"
          operations:
            - name: "UpdatePlayStoreConfig"
              method: POST
              description: "Flipdish Update Play Store Config"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "whitelabelconfig-app-id-app-store-icon"
          path: "/api/v1.0/whitelabelconfig/{appId}/app-store-icon"
          operations:
            - name: "UploadAppStoreIcon"
              method: POST
              description: "Flipdish Upload App Store Icon"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

