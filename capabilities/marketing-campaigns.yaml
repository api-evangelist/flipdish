naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Marketing — Campaigns"
  description: >-
    Campaigns operations on the Flipdish Open API v1.0 (10 operations).
    Lead operation: Flipdish Get Loyalty Campaigns for App. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Campaigns
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

