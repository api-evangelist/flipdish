      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Marketing — Campaigns business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "app-id-campaigns-loyalty"
          path: "/api/v1.0/{appId}/campaigns/loyalty"
          operations:
            - name: "GetLoyaltyCampaignsForApp"
              method: GET
              description: "Flipdish Get Loyalty Campaigns for App"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "app-id-campaigns-loyalty"
          path: "/api/v1.0/{appId}/campaigns/loyalty"
          operations:
            - name: "CreateLoyaltyCampaign"
              method: POST
              description: "Flipdish Create Loyalty Campaign"
              inputParameters:
                - name: "appId"
                  in: path
                  type: string
                  required: true
                  description: "The app id path parameter."
                - name: body
                  in: body
                  type: object
                  required: true
                  description: "Request body payload."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
