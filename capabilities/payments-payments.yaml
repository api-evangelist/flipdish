naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Payments — Payments"
  description: >-
    Payments operations on the Flipdish Open API v1.0 (1 operations).
    Lead operation: Flipdish Get Order Payment Information. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Payments
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "payments-payments"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Payments — Payments business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "payments-payment-order-id-refundable"
          path: "/api/v1.0/payments/payment/{orderId}/refundable"
          operations:
            - name: "GetOrderPaymentInformation"
              method: GET
              description: "Flipdish Get Order Payment Information"
              inputParameters:
                - name: "orderId"
                  in: path
                  type: integer
                  required: true
                  description: "The order id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "payments-payments-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Payments — Payments."
      resources:
        - path: "/v1/payments/payment/{order-id}/refundable"
          name: "payments-payment-order-id-refundable"
          description: "REST surface for GetOrderPaymentInformation."
          operations:
            - method: GET
              name: "GetOrderPaymentInformation"
              description: "Flipdish Get Order Payment Information"
              call: "payments-payments.GetOrderPaymentInformation"
              with:
                "orderId": "rest.orderId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "payments-payments-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Payments — Payments."
      tools:
        - name: "get-order-payment-information"
          description: "Flipdish Get Order Payment Information"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-payments.GetOrderPaymentInformation"
          with:
            "orderId": "tools.orderId"
          outputParameters:
            - type: object
              mapping: "$."
