naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Onboarding"
  description: >-
    Onboarding operations on the Flipdish Open API v1.0 (8 operations).
    Lead operation: Flipdish Onboarding_Get Onboarding Config. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Onboarding
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
