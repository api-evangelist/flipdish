naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — OAuthClients"
  description: >-
    OAuthClients operations on the Flipdish Open API v1.0 (11 operations).
    Lead operation: Flipdish O Auth Clients_Get Applications. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - OAuth Clients
  created: "2026-06-02"
  modified: "2026-06-02"

