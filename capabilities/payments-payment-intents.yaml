naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Payments — PaymentIntents"
  description: >-
    PaymentIntents operations on the Flipdish Open API v1.0 (1 operations).
    Lead operation: Flipdish Get Payment Intent. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Payment Intents
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

capability:

  consumes:
    - type: http
      namespace: "payments-payment-intents"
      baseUri: "https://api.flipdish.co"
      description: "Flipdish API - Payments — PaymentIntents business capability. Self-contained, no shared references."
      authentication:
        type: bearer
        token: "{{env.FLIPDISH_TOKEN}}"
      resources:
        - name: "payment-intents-payment-intent-id"
          path: "/api/v1.0/payment_intents/{paymentIntentId}"
          operations:
            - name: "GetPaymentIntent"
              method: GET
              description: "Flipdish Get Payment Intent"
              inputParameters:
                - name: "paymentIntentId"
                  in: path
                  type: string
                  required: true
                  description: "The payment intent id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "payments-payment-intents-rest"
      port: 8080
      description: "REST adapter for Flipdish API - Payments — PaymentIntents."
      resources:
        - path: "/v1/payment-intents/{payment-intent-id}"
          name: "payment-intents-payment-intent-id"
          description: "REST surface for GetPaymentIntent."
          operations:
            - method: GET
              name: "GetPaymentIntent"
              description: "Flipdish Get Payment Intent"
              call: "payments-payment-intents.GetPaymentIntent"
              with:
                "paymentIntentId": "rest.paymentIntentId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "payments-payment-intents-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Flipdish API - Payments — PaymentIntents."
      tools:
        - name: "get-payment-intent"
          description: "Flipdish Get Payment Intent"
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "payments-payment-intents.GetPaymentIntent"
          with:
            "paymentIntentId": "tools.paymentIntentId"
          outputParameters:
            - type: object
              mapping: "$."
