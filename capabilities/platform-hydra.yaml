naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Platform — Hydra"
  description: >-
    Hydra operations on the Flipdish Open API v1.0 (24 operations).
    Lead operation: Flipdish Get Settings. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Hydra
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
