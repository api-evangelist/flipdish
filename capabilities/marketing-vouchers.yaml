              description: "Flipdish Get Voucher by Id"
              inputParameters:
                - name: "voucherId"
                  in: path
                  type: integer
                  required: true
                  description: "The voucher id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
