naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Marketing — Vouchers"
  description: >-
    Vouchers operations on the Flipdish Open API v1.0 (10 operations).
    Lead operation: Flipdish Get Voucher by Id. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - Vouchers
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
