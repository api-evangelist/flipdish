          path: "/api/v1.0/oauthclients/{oauthAppId}/appstore/apps/{appStoreAppId}/external_product"
          operations:
            - name: "GetAppExternalProduct"
              method: GET
              description: "Flipdish Get App External Product"
              inputParameters:
                - name: "oauthAppId"
                  in: path
                  type: string
                  required: true
                  description: "The oauth app id path parameter."
                - name: "appStoreAppId"
                  in: path
                  type: string
                  required: true
                  description: "The app store app id path parameter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
