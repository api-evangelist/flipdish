naftiko: "1.0.0-alpha2"

info:
  label: "Flipdish API - Apps — AppStoreDeveloper"
  description: >-
    AppStoreDeveloper operations on the Flipdish Open API v1.0 (8 operations).
    Lead operation: Flipdish Get App External Product. Self-contained Naftiko capability covering one Flipdish business surface.
  tags:
    - Flipdish
    - Online Ordering
    - App Store Developer
  created: "2026-06-02"
  modified: "2026-06-02"

binds:
  - namespace: env
    keys:
      FLIPDISH_TOKEN: FLIPDISH_TOKEN

