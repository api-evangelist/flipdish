specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Flipdish
providerId: flipdish
created: '2026-06-02'
modified: '2026-06-02'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Restaurant
  - Online Ordering
  - Point of Sale
description: >-
  FOCUS-aligned FinOps for Flipdish: a hybrid subscription plus per-transaction take-rate model
  where restaurants pay a monthly platform subscription (POS + Online Ordering) and per-order
  payment/transaction fees, settled through Flipdish's integrated payments.
sources:
  - https://www.flipdish.com/pricing
  - https://developers.flipdish.com/docs/getting-started
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Flipdish (Flipdish Ltd.)
serviceCategory: Restaurant Commerce Platform
billingModel:
  pricingCategory: Subscription + Take Rate
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Refund
    - Adjustment
focusColumns:
  ServiceName: Flipdish
  ServiceCategory: Restaurant Commerce Platform
  ProviderName: Flipdish
  PublisherName: Flipdish Ltd.
  InvoiceIssuerName: Flipdish Ltd.
  BillingCurrency: EUR
  ChargeCategory: Usage
meters:
  - name: platform_subscription
    unit: month
    aggregation: sum
    dimensions:
      - product
      - billing_term
  - name: order_transactions
    unit: transaction
    aggregation: count
    dimensions:
      - store
      - sales_channel
      - country
  - name: payment_processing_volume
    unit: transaction
    aggregation: sum
    dimensions:
      - store
      - currency
      - card_brand
  - name: payouts
    unit: payout
    aggregation: sum
    dimensions:
      - bank_account
      - currency
  - name: hardware_and_devices
    unit: device
    aggregation: count
    dimensions:
      - device_type
principles:
  - name: Visibility
    description: >-
      Use the Flipdish Payouts, PayoutReports, and Invoices API surfaces to retrieve settlement and
      billing line items, and subscribe to sale.* webhook events to track order-level revenue in
      near real time.
  - name: Allocation
    description: >-
      Attribute spend and revenue per store, sales channel, and brand using the Stores, StoreGroups,
      and Channels resources so multi-location operators can allocate fees to the right cost center.
  - name: Optimization
    description: >-
      Bundle POS and Online Ordering for the published discount, consolidate stores under fewer
      OAuth clients to simplify reconciliation, and review PayoutReports for transaction-fee trends
      by channel.
  - name: Accountability
    description: >-
      Assign payout bank accounts and invoice ownership per brand; have finance reconcile the
      Invoices and Payouts APIs against the monthly subscription, and route fee questions to Flipdish
      support (help@flipdish.com).
