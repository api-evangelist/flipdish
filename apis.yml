    name: Flipdish API
    description: >-
      A REST API for the Flipdish online ordering platform exposing stores,
      orders, menus, vouchers, organizations, and webhook subscriptions. It
      supports building POS integrations, driver dispatch integrations, and
      App Store apps. Authentication uses OAuth 2.0 client credentials to obtain
      a bearer token. Base URL is https://api.flipdish.co with a Swagger spec
      and pre-generated SDKs.
