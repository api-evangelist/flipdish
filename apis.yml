aid: flipdish
name: Flipdish
description: >-
  Flipdish is an online ordering and branded app platform that gives restaurants
  and takeaways their own websites, mobile apps, kiosks, and order management
  tools to take direct, commission-free orders. For developers and integration
  partners, Flipdish provides a REST API documented in its Developer Hub that
  lets you access stores, orders, menus, vouchers, and other resources, manage
  organizations, and subscribe to webhooks for event handling. Authentication
  uses OAuth 2.0 with the client credentials flow: developers create an app in
  the Developer Portal, obtain a Client ID and Secret Key, and exchange them for
  a bearer access token. The API base URL is https://api.flipdish.co, and a
  Swagger specification and pre-generated SDKs are available.
type: Index
