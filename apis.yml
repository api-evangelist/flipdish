aid: flipdish
name: Flipdish
description: Flipdish is an online ordering and branded-app platform that gives restaurants and takeaways
  their own websites, mobile apps, kiosks, and order-management tools to take direct, commission-friendly
  orders. For developers and integration partners, Flipdish exposes a REST API (Flipdish Open API v1.0,
  base URL https://api.flipdish.co) documented in its Developer Hub, covering stores, orders, menus, catalog,
  customers, vouchers and campaigns, payouts and payments, apps and channels, devices, and platform resources,
  plus webhook/event subscriptions. Authentication uses OAuth 2.0 (implicit grant for first-party portal
  apps; client-credentials for server-to-server App Store apps). A Swagger specification at https://api.flipdish.co/swagger/docs/v1.0
  and pre-generated SDKs (C#, Java, PHP, JavaScript, TypeScript, plus a SignalR realtime client) are published
  from the flipdishbytes GitHub org.
type: company
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Restaurant
- Online Ordering
- Mobile Apps
- Point of Sale
- Orders
- Menu
